<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 SMT Bot — Сигналы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e17;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2d3748;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4f46e5;
        }
        .logo span {
            color: #fff;
        }
        .nav {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav a:hover {
            color: #fff;
            background: #1a1f2e;
        }
        .nav .user-email {
            color: #4f46e5;
            font-size: 14px;
        }
        .logout-btn {
            background: #1a1f2e;
            color: #94a3b8;
            border: 1px solid #2d3748;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            background: #2d3748;
            color: #fff;
        }
        .card {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2d3748;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h2 {
            font-size: 20px;
            font-weight: 600;
        }
        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
        }
        .filter-group label {
            color: #94a3b8;
            font-size: 14px;
        }
        .filter-group select {
            padding: 8px 16px;
            background: #0a0e17;
            color: #fff;
            border: 1px solid #2d3748;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .filter-group select:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .apply-btn {
            padding: 8px 24px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .apply-btn:hover {
            background: #4338ca;
        }
        .signal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #1a1f2e;
            flex-wrap: wrap;
            gap: 8px;
        }
        .signal-item:last-child {
            border-bottom: none;
        }
        .signal-item .left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .signal-item .right {
            text-align: right;
        }
        .side-long { color: #10b981; }
        .side-short { color: #ef4444; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-active {
            background: #065f46;
            color: #6ee7b7;
        }
        .badge-checked {
            background: #1e293b;
            color: #94a3b8;
        }
        .badge-profit {
            background: #065f46;
            color: #6ee7b7;
        }
        .badge-loss {
            background: #7f1d1d;
            color: #fca5a5;
        }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        .neutral { color: #f59e0b; }
        .empty {
            color: #94a3b8;
            text-align: center;
            padding: 40px;
            font-size: 16px;
        }
        .signal-time {
            color: #94a3b8;
            font-size: 12px;
        }
        .back-link {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stats-row .stat {
            background: #0a0e17;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .stats-row .stat .value {
            font-size: 18px;
            font-weight: 700;
        }
        .stats-row .stat .label {
            color: #94a3b8;
            font-size: 11px;
            text-transform: uppercase;
        }
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .nav {
                justify-content: center;
            }
            .signal-item {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .signal-item .right {
                text-align: center;
            }
            .signal-item .left {
                justify-content: center;
            }
            .filter-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SMT <span>Bot</span></div>
        <div class="nav">
            <span class="user-email" id="userEmail"></span>
            <a href="/dashboard.html">📊 ЛК</a>
            <a href="/index.html">Главная</a>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>📡 Все сигналы</h2>
            <a href="/dashboard.html" class="back-link">← Назад в ЛК</a>
        </div>

        <div class="stats-row" id="statsRow">
            <div class="stat">
                <div class="value" id="statTotal">0</div>
                <div class="label">Всего</div>
            </div>
            <div class="stat">
                <div class="value positive" id="statProfit">0</div>
                <div class="label">Прибыль</div>
            </div>
            <div class="stat">
                <div class="value negative" id="statLoss">0</div>
                <div class="label">Убыток</div>
            </div>
            <div class="stat">
                <div class="value" id="statActive">0</div>
                <div class="label">Активные</div>
            </div>
        </div>

        <div class="filter-group">
            <label for="periodFilter">Период:</label>
            <select id="periodFilter">
                <option value="all">За весь период</option>
                <option value="today">Сегодня</option>
                <option value="week">За неделю</option>
                <option value="month">За месяц</option>
            </select>
            <button class="apply-btn" onclick="applyFilter()">Применить</button>
        </div>

        <div id="signalsContainer">
            <div class="empty">Загрузка...</div>
        </div>
    </div>

    <script>
        (function() {
            const userEmail = localStorage.getItem('smt_user_email');
            if (!userEmail) {
                window.location.replace('/login.html');
                return;
            }

            document.getElementById('userEmail').textContent = userEmail;

            let allSignals = [];

            async function loadSignals() {
                try {
                    const resp = await fetch(`/api/signals/user/${userEmail}`);
                    const data = await resp.json();
                    allSignals = data.signals || [];
                    applyFilter();
                } catch (e) {
                    console.error('Ошибка загрузки сигналов:', e);
                    allSignals = [];
                    applyFilter();
                }
            }

            window.applyFilter = function() {
                const period = document.getElementById('periodFilter').value;
                let filtered = [...allSignals];

                const now = new Date();
                if (period === 'today') {
                    const start = new Date(now);
                    start.setHours(0, 0, 0, 0);
                    filtered = filtered.filter(s => new Date(s.created_at) >= start);
                } else if (period === 'week') {
                    const start = new Date(now);
                    start.setDate(start.getDate() - 7);
                    filtered = filtered.filter(s => new Date(s.created_at) >= start);
                } else if (period === 'month') {
                    const start = new Date(now);
                    start.setMonth(start.getMonth() - 1);
                    filtered = filtered.filter(s => new Date(s.created_at) >= start);
                }

                renderSignals(filtered);
            };

            function renderSignals(signals) {
                const container = document.getElementById('signalsContainer');
                
                // Статистика
                const total = signals.length;
                const profit = signals.filter(s => s.check_result === 'profit').length;
                const loss = signals.filter(s => s.check_result === 'loss').length;
                const active = signals.filter(s => !s.checked).length;

                document.getElementById('statTotal').textContent = total;
                document.getElementById('statProfit').textContent = profit;
                document.getElementById('statLoss').textContent = loss;
                document.getElementById('statActive').textContent = active;

                if (!signals || signals.length === 0) {
                    container.innerHTML = '<div class="empty">Нет сигналов за выбранный период</div>';
                    return;
                }

                container.innerHTML = signals.map(s => {
                    let statusBadge = '';
                    let statusClass = '';
                    
                    if (!s.checked) {
                        statusBadge = '<span class="badge badge-active">активен</span>';
                    } else if (s.check_result === 'profit') {
                        statusBadge = '<span class="badge badge-profit">✅ прибыль</span>';
                    } else if (s.check_result === 'loss') {
                        statusBadge = '<span class="badge badge-loss">❌ убыток</span>';
                    } else {
                        statusBadge = '<span class="badge badge-checked">проверен</span>';
                    }

                    const rsi = s.rsi ? `RSI: ${s.rsi}` : '';
                    const macd = s.macd ? `MACD: ${s.macd}` : '';

                    return `
                        <div class="signal-item">
                            <div class="left">
                                <strong>${s.symbol || '--'}</strong>
                                <span class="${s.side === 'LONG' ? 'side-long' : 'side-short'}">${s.side || '--'}</span>
                                <span style="color:#94a3b8;font-size:12px;">${rsi} ${macd}</span>
                                ${statusBadge}
                            </div>
                            <div class="right">
                                <div>Entry: $${(s.entry_price || 0).toFixed(4)}</div>
                                <div class="signal-time">${s.created_at ? new Date(s.created_at).toLocaleString() : '--'}</div>
                                <div style="font-size:12px;color:#94a3b8;margin-top:4px;">
                                    ${s.reasons ? s.reasons.join(' | ') : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.logout = function() {
                localStorage.removeItem('smt_user_email');
                window.location.replace('/login.html');
            };

            loadSignals();

            // Автообновление каждые 30 секунд
            setInterval(loadSignals, 30000);

        })();
    </script>

</body>
</html>
