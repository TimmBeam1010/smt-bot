<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ SMT Bot — Своя конфигурация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e17;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2d3748;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4f46e5;
        }
        .logo span {
            color: #fff;
        }
        .back-link {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .card {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2d3748;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h2 {
            font-size: 20px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #0a0e17;
            color: #fff;
            border: 1px solid #2d3748;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }
        .checkbox-item {
            background: #0a0e17;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1a1f2e;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-item:hover {
            border-color: #4f46e5;
        }
        .checkbox-item.active {
            border-color: #4f46e5;
            background: #1a1f2e;
        }
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #4f46e5;
            cursor: pointer;
        }
        .checkbox-item .label {
            font-size: 14px;
            cursor: pointer;
        }
        .checkbox-item .price-add {
            margin-left: auto;
            color: #4f46e5;
            font-size: 13px;
            font-weight: 600;
        }
        .price-summary {
            background: #0a0e17;
            padding: 20px;
            border-radius: 12px;
            margin-top: 16px;
            border: 1px solid #2d3748;
        }
        .price-summary .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }
        .price-summary .row.total {
            border-top: 1px solid #2d3748;
            margin-top: 8px;
            padding-top: 12px;
            font-size: 18px;
            font-weight: 700;
        }
        .price-summary .row .label {
            color: #94a3b8;
        }
        .price-summary .row .value {
            color: #fff;
        }
        .price-summary .row .value.price {
            color: #4f46e5;
        }
        .btn-payment {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 16px;
        }
        .btn-payment:hover {
            background: #059669;
        }
        .btn-payment:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status-msg {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        .status-msg.success {
            display: block;
            background: #065f46;
            color: #6ee7b7;
        }
        .status-msg.error {
            display: block;
            background: #7f1d1d;
            color: #fca5a5;
        }
        .status-msg.info {
            display: block;
            background: #92400e;
            color: #fbbf24;
        }
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .card {
                padding: 16px;
            }
            .checkbox-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SMT <span>Bot</span></div>
        <a href="/configure-bot.html" class="back-link">← Назад к тарифам</a>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>⚙️ Настройте своего бота</h2>
        </div>

        <div class="status-msg" id="statusMessage"></div>

        <div class="form-group">
            <label for="botName">Название бота</label>
            <input type="text" id="botName" placeholder="Мой супер бот" value="Мой бот">
        </div>

        <div class="form-group">
            <label>Стратегии (выберите одну или несколько)</label>
            <div class="checkbox-group">
                <div class="checkbox-item active" onclick="toggleCheckbox(this)">
                    <input type="checkbox" checked value="rsi">
                    <span class="label">RSI</span>
                    <span class="price-add">+$0</span>
                </div>
                <div class="checkbox-item" onclick="toggleCheckbox(this)">
                    <input type="checkbox" value="macd">
                    <span class="label">MACD</span>
                    <span class="price-add">+$5</span>
                </div>
                <div class="checkbox-item" onclick="toggleCheckbox(this)">
                    <input type="checkbox" value="bollinger">
                    <span class="label">Bollinger Bands</span>
                    <span class="price-add">+$5</span>
                </div>
                <div class="checkbox-item" onclick="toggleCheckbox(this)">
                    <input type="checkbox" value="ai">
                    <span class="label">🤖 AI-прогноз</span>
                    <span class="price-add">+$15</span>
                </div>
                <div class="checkbox-item" onclick="toggleCheckbox(this)">
                    <input type="checkbox" value="real">
                    <span class="label">💳 Реальная торговля</span>
                    <span class="price-add">+$20</span>
                </div>
                <div class="checkbox-item" onclick="toggleCheckbox(this)">
                    <input type="checkbox" value="notifications">
                    <span class="label">📱 Telegram уведомления</span>
                    <span class="price-add">+$3</span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="signalsCount">Количество сигналов в день</label>
            <select id="signalsCount">
                <option value="5">5 сигналов</option>
                <option value="10" selected>10 сигналов</option>
                <option value="20">20 сигналов</option>
                <option value="50">50 сигналов (+$10)</option>
                <option value="100">100 сигналов (+$20)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="botsCount">Количество ботов</label>
            <select id="botsCount">
                <option value="1">1 бот</option>
                <option value="3" selected>3 бота</option>
                <option value="5">5 ботов (+$10)</option>
                <option value="10">10 ботов (+$25)</option>
            </select>
        </div>

        <div class="price-summary">
            <div class="row">
                <span class="label">Базовая цена</span>
                <span class="value price">$5.00</span>
            </div>
            <div class="row" id="extrasRow" style="display:none;">
                <span class="label">Дополнительные опции</span>
                <span class="value price" id="extrasPrice">$0.00</span>
            </div>
            <div class="row total">
                <span class="label">Итого в месяц</span>
                <span class="value price" id="totalPrice">$5.00</span>
            </div>
        </div>

        <button class="btn-payment" id="paymentBtn" onclick="proceedToPayment()">
            💳 Оплатить $5.00
        </button>
    </div>

    <script>
        (function() {
            const userEmail = localStorage.getItem('smt_user_email');
            if (!userEmail) {
                window.location.replace('/login.html');
                return;
            }

            let basePrice = 5;
            let extrasPrice = 0;
            let currentTotal = 5;

            function showStatus(type, message) {
                const el = document.getElementById('statusMessage');
                el.className = 'status-msg ' + type;
                el.textContent = message;
                el.style.display = 'block';
                setTimeout(() => {
                    el.style.display = 'none';
                }, 5000);
            }

            window.toggleCheckbox = function(el) {
                const checkbox = el.querySelector('input[type="checkbox"]');
                checkbox.checked = !checkbox.checked;
                el.classList.toggle('active', checkbox.checked);
                calculatePrice();
            };

            function calculatePrice() {
                let total = basePrice;
                extrasPrice = 0;

                // Считаем опции
                document.querySelectorAll('.checkbox-item input[type="checkbox"]:checked').forEach(cb => {
                    const parent = cb.closest('.checkbox-item');
                    const priceText = parent.querySelector('.price-add')?.textContent || '';
                    const priceMatch = priceText.match(/\$(\d+)/);
                    if (priceMatch) {
                        const price = parseInt(priceMatch[1]);
                        if (price > 0) {
                            extrasPrice += price;
                        }
                    }
                });

                // Дополнительные сигналы
                const signalsSelect = document.getElementById('signalsCount');
                const signalsValue = parseInt(signalsSelect.value);
                if (signalsValue > 10) {
                    extrasPrice += (signalsValue - 10) * 0.4;
                }

                // Дополнительные боты
                const botsSelect = document.getElementById('botsCount');
                const botsValue = parseInt(botsSelect.value);
                if (botsValue > 3) {
                    extrasPrice += (botsValue - 3) * 5;
                }

                total += extrasPrice;
                currentTotal = Math.round(total * 100) / 100;

                document.getElementById('totalPrice').textContent = '$' + currentTotal.toFixed(2);

                const extrasRow = document.getElementById('extrasRow');
                if (extrasPrice > 0) {
                    extrasRow.style.display = 'flex';
                    document.getElementById('extrasPrice').textContent = '+$' + extrasPrice.toFixed(2);
                } else {
                    extrasRow.style.display = 'none';
                }

                document.getElementById('paymentBtn').textContent = '💳 Оплатить $' + currentTotal.toFixed(2);
            }

            window.proceedToPayment = function() {
                const botName = document.getElementById('botName').value.trim() || 'Мой бот';

                // Собираем выбранные опции
                const selectedOptions = [];
                document.querySelectorAll('.checkbox-item input[type="checkbox"]:checked').forEach(cb => {
                    selectedOptions.push(cb.value);
                });

                const signalsCount = document.getElementById('signalsCount').value;
                const botsCount = document.getElementById('botsCount').value;

                const config = {
                    name: botName,
                    price: currentTotal,
                    options: selectedOptions,
                    signals: signalsCount,
                    bots: botsCount,
                    isCustom: true
                };

                localStorage.setItem('smt_custom_config', JSON.stringify(config));
                localStorage.setItem('smt_selected_tariff', JSON.stringify({
                    id: 'custom',
                    name: 'Своя конфигурация',
                    price: currentTotal,
                    isCustom: true,
                    config: config
                }));

                window.location.href = '/select-exchange.html';
            };

            // События изменения
            document.getElementById('signalsCount').addEventListener('change', calculatePrice);
            document.getElementById('botsCount').addEventListener('change', calculatePrice);

            calculatePrice();

        })();
    </script>

</body>
</html>
