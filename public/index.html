<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot</title>
    <style>
        body {
            background: #0a0e17;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 8px;
        }
        h1 span {
            color: #4f46e5;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 18px;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            background: #1a1f2e;
            color: #fff;
            padding: 12px 32px;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid #2d3748;
            transition: all 0.2s;
        }
        .links a:hover {
            background: #4f46e5;
            border-color: #4f46e5;
        }
        .links a.primary {
            background: #4f46e5;
            border-color: #4f46e5;
        }
        .links a.primary:hover {
            background: #4338ca;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMT <span>Bot</span></h1>
        <div class="subtitle">Торговые сигналы на крипторынке</div>
        <div class="links">
            <a href="/login.html" class="primary">Войти</a>
            <a href="/dashboard.html">Личный кабинет</a>
        </div>
    </div>
</body>
</html>
