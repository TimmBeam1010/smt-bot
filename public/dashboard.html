<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot — Личный кабинет</title>
    <style>
        body {
            background: #0a0e17;
            color: #e2e8f0;
            font-family: sans-serif;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            margin: 40px auto;
        }
        .btn {
            background: #4f46e5;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🔐 SMT Bot</h1>
        <p id="status">Загрузка...</p>
        <button class="btn" onclick="checkAuth()">🔄 Проверить вход</button>
        <br><br>
        <a href="/" style="color:#4f46e5;">← На главную</a>
    </div>

    <script>
        // Упрощённая проверка авторизации
        function getUser() {
            try {
                return JSON.parse(localStorage.getItem('smt_user'));
            } catch {
                return null;
            }
        }

        function checkAuth() {
            const user = getUser();
            const status = document.getElementById('status');
            if (user && user.email) {
                status.innerHTML = `✅ Вы вошли как <strong>${user.email}</strong>`;
                status.style.color = '#22c55e';
            } else {
                status.innerHTML = '❌ Вы не авторизованы. Перейдите на <a href="/login.html" style="color:#4f46e5;">страницу входа</a>.';
                status.style.color = '#ef4444';
            }
        }

        // Запускаем проверку при загрузке
        checkAuth();
    </script>

</body>
</html>
