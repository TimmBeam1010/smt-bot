<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot — Личный кабинет</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0a0e17;
            color: #fff;
            padding: 16px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 16px;
            border-bottom: 1px solid #1a1f2e;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: clamp(22px, 4vw, 28px);
            font-weight: 700;
            color: #4f46e5;
            cursor: pointer;
            text-decoration: none;
        }
        .burger {
            font-size: 28px;
            cursor: pointer;
            color: #94a3b8;
            user-select: none;
            padding: 4px 8px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .burger:hover {
            background: #1a1f2e;
            color: #fff;
        }
        .burger-menu {
            display: none;
            flex-direction: column;
            gap: 8px;
            background: #1a1f2e;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid #2d3748;
            margin-top: 8px;
            width: 100%;
        }
        .burger-menu.open {
            display: flex;
        }
        .burger-menu a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 16px;
            padding: 6px 0;
            transition: 0.2s;
        }
        .burger-menu a:hover {
            color: #fff;
        }
        .card {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #2d3748;
            margin-top: 20px;
        }
        .card h2 {
            font-size: clamp(18px, 2vw, 22px);
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card h2 .badge {
            font-size: 13px;
            background: #2d3748;
            padding: 2px 10px;
            border-radius: 20px;
            color: #94a3b8;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }
        .stat-item {
            text-align: center;
            background: #2d3748;
            padding: 14px;
            border-radius: 12px;
        }
        .stat-item .label {
            color: #94a3b8;
            font-size: clamp(12px, 1.2vw, 14px);
        }
        .stat-item .value {
            font-size: clamp(20px, 2.5vw, 28px);
            font-weight: 700;
            margin-top: 4px;
        }
        .value.green {
            color: #34d399;
        }
        .value.red {
            color: #f87171;
        }
        .value.white {
            color: #fff;
        }
        .bot-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bot-status .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.online {
            background: #34d399;
        }
        .dot.offline {
            background: #f87171;
        }
        .settings-icon {
            font-size: 22px;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.2s;
        }
        .settings-icon:hover {
            color: #fff;
        }
        .signal-item {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 4px solid #4f46e5;
            background: #1a1f2e;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .signal-item.unread {
            background: #2d3748;
        }
        .signal-item .symbol {
            font-weight: 600;
            font-size: clamp(15px, 1.4vw, 17px);
        }
        .signal-item .side {
            font-weight: 600;
            font-size: clamp(14px, 1.3vw, 16px);
        }
        .signal-item .side.long {
            color: #34d399;
        }
        .signal-item .side.short {
            color: #f87171;
        }
        .signal-item .meta {
            color: #94a3b8;
            font-size: clamp(12px, 1.2vw, 14px);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .expand-btn {
            background: transparent;
            border: 1px solid #4f46e5;
            color: #94a3b8;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            margin-top: 8px;
        }
        .expand-btn:hover {
            background: #4f46e5;
            color: #fff;
        }

        /* БОТ-КАРТОЧКИ */
        .bot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }
        .bot-card {
            background: #2d3748;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #1a1f2e;
            transition: 0.2s;
        }
        .bot-card:hover {
            border-color: #4f46e5;
        }
        .bot-card .bot-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .bot-card .exchange-logo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1a1f2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #4f46e5;
            flex-shrink: 0;
        }
        .bot-card .exchange-logo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .bot-card .bot-name {
            font-size: 18px;
            font-weight: 600;
        }
        .bot-card .exchange-name {
            font-size: 14px;
            color: #94a3b8;
        }
        .bot-card .bot-detail {
            color: #94a3b8;
            font-size: 14px;
            margin: 4px 0;
        }
        .bot-card .bot-detail strong {
            color: #fff;
        }
        .add-bot-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 2px dashed #4f46e5;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            font-size: 32px;
            color: #4f46e5;
            transition: 0.2s;
            min-height: 120px;
        }
        .add-bot-btn:hover {
            background: #1a1f2e;
            border-color: #818cf8;
        }

        footer {
            border-top: 1px solid #1a1f2e;
            padding: 20px 0;
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        footer .links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        footer .links a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }
        footer .links a:hover {
            color: #fff;
        }
        .logout-btn {
            background: #f87171;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: #ef4444;
        }

        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr 1fr;
            }
            footer {
                flex-direction: column;
                text-align: center;
            }
            .signal-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .bot-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <header>
            <a href="/" class="logo">🤖 SMT Bot</a>
            <div class="burger" id="burgerBtn">☰</div>
        </header>

        <div class="burger-menu" id="burgerMenu">
            <a href="/">🏠 Главная</a>
            <a href="#" id="profileLink">👤 Личная информация</a>
            <a href="#" id="settingsLink">⚙️ Настройки</a>
        </div>

        <!-- PNL -->
        <div class="card">
            <h2>📊 Ваш PNL</h2>
            <div class="grid-2">
                <div class="stat-item">
                    <div class="label">💰 Депозит</div>
                    <div class="value white" id="deposit">--</div>
                </div>
                <div class="stat-item">
                    <div class="label">📈 PNL (USDT)</div>
                    <div class="value" id="pnlUsdt">--</div>
                </div>
                <div class="stat-item">
                    <div class="label">📊 PNL (%)</div>
                    <div class="value" id="pnlPercent">--</div>
                </div>
                <div class="stat-item">
                    <div class="label">🏦 Депозит + PNL</div>
                    <div class="value white" id="depositPnl">--</div>
                </div>
                <div class="stat-item" style="grid-column: span 2;">
                    <div class="label">📌 Открытых сделок</div>
                    <div class="value white" id="openTrades">0</div>
                </div>
            </div>
        </div>

        <!-- БЛОК «БОТ» (карточки) -->
        <div class="card">
            <h2>
                🤖 Мои боты
                <span class="badge" id="botCount">0</span>
            </h2>
            <div class="bot-grid" id="botGrid">
                <div class="add-bot-btn" id="addBotBtn">+</div>
            </div>
        </div>

        <!-- СИГНАЛЫ -->
        <div class="card">
            <h2>
                📈 Сигналы
                <span class="badge" id="signalBadge">0 новых</span>
            </h2>
            <div id="signalsList">
                <p style="color:#94a3b8;">Загрузка...</p>
            </div>
            <button class="expand-btn" id="expandSignalsBtn">📋 Перейти к списку сигналов</button>
        </div>

        <footer>
            <div class="links">
                <a href="/">Главная</a>
                <a href="#">Помощь</a>
                <a href="#">Контакты</a>
                <a href="#">Политика</a>
            </div>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </footer>

    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('smtUser') || 'null');
        if (!user || !user.email) {
            window.location.href = '/login.html';
        }

        // ===== БУРГЕР =====
        const burgerBtn = document.getElementById('burgerBtn');
        const burgerMenu = document.getElementById('burgerMenu');
        burgerBtn.addEventListener('click', () => {
            burgerMenu.classList.toggle('open');
        });

        // ===== ВЫХОД =====
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('smtUser');
            window.location.href = '/';
        });

        // ===== ПЕРЕХОД НА СТРАНИЦУ СИГНАЛОВ =====
        document.getElementById('expandSignalsBtn').addEventListener('click', () => {
            window.location.href = '/signals.html';
        });

        // ===== ДОБАВЛЕНИЕ БОТА =====
        document.getElementById('addBotBtn').addEventListener('click', () => {
            alert('Переход на страницу тарифов для подключения бота (будет реализовано)');
        });

        // ===== ЗАГРУЗКА ДАННЫХ =====
        async function loadDashboard() {
            try {
                const res = await fetch(`/api/user/${user.email}`);
                const data = await res.json();
                if (res.ok && data.user) {
                    const u = data.user;
                    const deposit = u.deposit || 1000;
                    const pnl = u.pnl || 0;
                    const pnlUsdt = deposit * (pnl / 100);
                    document.getElementById('deposit').textContent = '$' + deposit.toFixed(2);
                    document.getElementById('pnlUsdt').textContent = (pnlUsdt >= 0 ? '+' : '') + pnlUsdt.toFixed(2);
                    document.getElementById('pnlUsdt').className = 'value ' + (pnlUsdt >= 0 ? 'green' : 'red');
                    document.getElementById('pnlPercent').textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(2) + '%';
                    document.getElementById('pnlPercent').className = 'value ' + (pnl >= 0 ? 'green' : 'red');
                    document.getElementById('depositPnl').textContent = '$' + (deposit + pnlUsdt).toFixed(2);
                    document.getElementById('openTrades').textContent = u.openTrades || 0;

                    loadBots(u.bots || []);
                    loadSignals();
                }
            } catch (err) {
                console.error('Ошибка загрузки:', err);
            }
        }

        // ===== БОТЫ =====
        function loadBots(bots) {
            const grid = document.getElementById('botGrid');
            const countBadge = document.getElementById('botCount');
            countBadge.textContent = bots.length;

            const addBtn = grid.querySelector('.add-bot-btn');
            grid.innerHTML = '';
            grid.appendChild(addBtn);

            const exchangeLogos = {
                binance: '币',
                bybit: 'B',
                bingx: 'B',
                okx: 'O',
                default: '🏦'
            };

            bots.forEach((bot, index) => {
                const card = document.createElement('div');
                card.className = 'bot-card';
                const isActive = bot.active !== false;
                const hasAutoTrade = bot.services && bot.services.includes('autotrade');
                const exchange = bot.exchange || 'bingx';
                const logoChar = exchangeLogos[exchange.toLowerCase()] || exchangeLogos.default;

                let details = `
                    <div class="bot-header">
                        <div class="exchange-logo">${logoChar}</div>
                        <div>
                            <div class="bot-name">🤖 Бот #${index + 1}</div>
                            <div class="exchange-name">${exchange.charAt(0).toUpperCase() + exchange.slice(1)}</div>
                        </div>
                    </div>
                    <div class="bot-detail">
                        <span class="bot-status">
                            <span class="dot ${isActive ? 'online' : 'offline'}"></span>
                            ${isActive ? 'Активен' : 'Приостановлен'}
                        </span>
                    </div>
                    <div class="bot-detail"><strong>Тариф:</strong> ${bot.tariff || 'Стандарт'}</div>
                    <div class="bot-detail"><strong>Услуги:</strong> ${(bot.services || ['Сигналы']).join(', ')}</div>
                    <div class="bot-detail"><strong>До:</strong> ${bot.tariffEnd || '2026-08-01'}</div>
                `;

                if (hasAutoTrade) {
                    details += `
                        <div class="bot-detail"><strong>Депозит:</strong> $${(bot.deposit || 0).toFixed(2)}</div>
                        <div class="bot-detail"><strong>PNL:</strong> <span style="color:${bot.pnl >= 0 ? '#34d399' : '#f87171'}">${(bot.pnl || 0).toFixed(2)}%</span></div>
                        <div class="bot-detail"><strong>Открыто:</strong> ${bot.openTrades || 0} | <strong>Закрыто:</strong> ${bot.closedTrades || 0}</div>
                    `;
                }

                card.innerHTML = details;
                grid.insertBefore(card, addBtn);
            });
        }

        // ===== СИГНАЛЫ =====
        async function loadSignals() {
            try {
                const res = await fetch(`/api/signals/user/${user.email}`);
                const data = await res.json();
                const container = document.getElementById('signalsList');
                const badge = document.getElementById('signalBadge');
                if (data.signals && data.signals.length) {
                    const unread = data.signals.filter(s => !s.read).length;
                    badge.textContent = unread + ' новых';
                    container.innerHTML = data.signals.slice(0, 5).map(s => signalHTML(s)).join('');
                } else {
                    container.innerHTML = '<p style="color:#94a3b8;">Нет сигналов</p>';
                    badge.textContent = '0 новых';
                }
            } catch (err) {
                console.error('Ошибка загрузки сигналов:', err);
                document.getElementById('signalsList').innerHTML = '<p style="color:#f87171;">Ошибка загрузки</p>';
            }
        }

        function signalHTML(s) {
            const sideClass = s.side.toLowerCase();
            const unreadClass = s.read ? '' : 'unread';
            return `
                <div class="signal-item ${unreadClass}">
                    <div>
                        <span class="symbol">${s.symbol}</span>
                        <span class="side ${sideClass}">${s.side}</span>
                    </div>
                    <div class="meta">
                        <span>💰 ${s.entry_price}</span>
                        <span>🎯 ${s.confidence}</span>
                        <span>📅 ${new Date(s.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
            `;
        }

        // ===== ЗАГЛУШКИ =====
        document.getElementById('profileLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Личная информация (будет реализовано позже)');
        });
        document.getElementById('settingsLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Настройки (будет реализовано позже)');
        });

        loadDashboard();
    </script>
</body>
</html>
