<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 SMT Bot — Личный кабинет</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e17;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2d3748;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4f46e5;
        }
        .logo span {
            color: #fff;
        }
        .nav {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav a:hover {
            color: #fff;
            background: #1a1f2e;
        }
        .nav .user-email {
            color: #4f46e5;
            font-size: 14px;
        }
        .logout-btn {
            background: #1a1f2e;
            color: #94a3b8;
            border: 1px solid #2d3748;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            background: #2d3748;
            color: #fff;
        }
        .card {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2d3748;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h2, .card-header h3 {
            font-size: 18px;
            font-weight: 600;
        }
        .refresh-btn {
            background: #4f46e5;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .refresh-btn:hover {
            background: #4338ca;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }
        .stat {
            background: #0a0e17;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #1a1f2e;
        }
        .stat .value {
            font-size: 26px;
            font-weight: 700;
            margin-top: 4px;
        }
        .stat .label {
            color: #94a3b8;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat .sub {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        .neutral { color: #f59e0b; }
        .trade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #1a1f2e;
            flex-wrap: wrap;
            gap: 8px;
        }
        .trade-item:last-child {
            border-bottom: none;
        }
        .trade-item .left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .trade-item .right {
            text-align: right;
        }
        .side-long { color: #10b981; }
        .side-short { color: #ef4444; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-open {
            background: #065f46;
            color: #6ee7b7;
        }
        .badge-closed {
            background: #1e293b;
            color: #94a3b8;
        }
        .badge-active {
            background: #065f46;
            color: #6ee7b7;
        }
        .badge-paused {
            background: #92400e;
            color: #fbbf24;
        }
        .badge-inactive {
            background: #1e293b;
            color: #94a3b8;
        }
        .btn-close {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        .btn-close:hover {
            background: #dc2626;
        }
        .btn-pause {
            background: #f59e0b;
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
            margin-left: 4px;
        }
        .btn-pause:hover {
            background: #d97706;
        }
        .btn-resume {
            background: #10b981;
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
            margin-left: 4px;
        }
        .btn-resume:hover {
            background: #059669;
        }
        .btn-delete {
            background: #7f1d1d;
            color: #fca5a5;
            border: none;
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
            margin-left: 4px;
        }
        .btn-delete:hover {
            background: #991b1b;
        }
        .empty {
            color: #94a3b8;
            text-align: center;
            padding: 24px;
            font-size: 14px;
        }
        .ws-status {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ws-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .ws-status .dot.connected {
            background: #10b981;
        }
        .ws-status .dot.disconnected {
            background: #ef4444;
        }
        .bot-item {
            background: #0a0e17;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #1a1f2e;
            margin-bottom: 12px;
        }
        .bot-item:last-child {
            margin-bottom: 0;
        }
        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .bot-name {
            font-weight: 600;
            font-size: 16px;
        }
        .bot-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-top: 8px;
            font-size: 13px;
            color: #94a3b8;
        }
        .bot-details span {
            background: #1a1f2e;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .bot-actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .nav {
                justify-content: center;
            }
            .grid {
                grid-template-columns: 1fr 1fr;
            }
            .trade-item {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .trade-item .right {
                text-align: center;
            }
            .trade-item .left {
                justify-content: center;
            }
            .bot-header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .bot-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SMT <span>Bot</span></div>
        <div class="nav">
            <span class="user-email" id="userEmail"></span>
            <a href="/index.html">Главная</a>
            <a href="/admin.html">Админка</a>
            <a href="/signals.html">Сигналы</a>
            <a href="/chat.html">Чат</a>
            <button class="logout-btn" onclick="logout()">Выйти</button>
            <span class="ws-status">
                <span class="dot disconnected" id="wsDot"></span>
                <span id="wsLabel">отключено</span>
            </span>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>📊 Портфель в реальном времени</h2>
            <button class="refresh-btn" onclick="updatePnl()">🔄 Обновить</button>
        </div>
        <div class="grid" id="pnlGrid">
            <div class="stat">
                <div class="label">Баланс</div>
                <div class="value" id="currentBalance">$0.00</div>
                <div class="sub">
                    <span id="initialBalance">$0.00</span>
                    <span id="balanceChange"></span>
                </div>
            </div>
            <div class="stat">
                <div class="label">Общий PNL</div>
                <div class="value" id="totalPnl">$0.00</div>
            </div>
            <div class="stat">
                <div class="label">Сделки</div>
                <div class="value" id="tradeStats">0</div>
                <div class="sub">
                    🟢 <span id="winCount">0</span> | 🔴 <span id="lossCount">0</span>
                </div>
            </div>
            <div class="stat">
                <div class="label">Win Rate</div>
                <div class="value" id="winRate">0%</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3>🤖 Мои боты</h3>
            <a href="/configure-bot.html" style="color:#4f46e5;text-decoration:none;font-size:14px;">+ Создать бота</a>
        </div>
        <div id="botsContainer"></div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3>📈 Открытые позиции (<span id="openCount">0</span>)</h3>
        </div>
        <div id="openPositions"></div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3>📜 История сделок</h3>
        </div>
        <div id="tradeHistory"></div>
    </div>

    <script>
        (function() {
            const userEmail = localStorage.getItem('smt_user_email');
            if (!userEmail) {
                window.location.replace('/login.html');
                return;
            }

            document.getElementById('userEmail').textContent = userEmail;

            let ws = null;
            let reconnectAttempts = 0;
            const MAX_RECONNECT = 5;

            async function loadBots() {
                try {
                    const resp = await fetch(`/api/user/${userEmail}`);
                    const data = await resp.json();
                    if (data.user && data.user.bots) {
                        renderBots(data.user.bots);
                    } else {
                        renderBots([]);
                    }
                } catch (e) {
                    console.error('Ошибка загрузки ботов:', e);
                    renderBots([]);
                }
            }

            function renderBots(bots) {
                const container = document.getElementById('botsContainer');
                if (!bots || bots.length === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            У вас ещё нет ботов.<br>
                            <a href="/configure-bot.html" style="color:#4f46e5;text-decoration:none;">Создать первого бота →</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = bots.map((bot, index) => {
                    const statusClass = bot.active ? (bot.paused ? 'badge-paused' : 'badge-active') : 'badge-inactive';
                    const statusText = bot.active ? (bot.paused ? '⏸ Пауза' : '✅ Активен') : '⛔ Отключён';
                    
                    return `
                        <div class="bot-item">
                            <div class="bot-header">
                                <div>
                                    <span class="bot-name">${bot.exchange || 'Демо-бот'}</span>
                                    <span class="badge ${statusClass}" style="margin-left:8px;">${statusText}</span>
                                </div>
                                <div class="bot-actions">
                                    ${bot.active ? `
                                        ${bot.paused ? 
                                            `<button class="btn-resume" onclick="toggleBot(${index}, false)">▶ Возобновить</button>` :
                                            `<button class="btn-pause" onclick="toggleBot(${index}, true)">⏸ Пауза</button>`
                                        }
                                    ` : `
                                        <button class="btn-resume" onclick="toggleBot(${index}, false, true)">▶ Активировать</button>
                                    `}
                                    <button class="btn-delete" onclick="deleteBot(${index})">🗑 Удалить</button>
                                </div>
                            </div>
                            <div class="bot-details">
                                <span>💰 Депозит: $${(bot.deposit || 0).toFixed(2)}</span>
                                <span>📈 PNL: ${(bot.pnl || 0) >= 0 ? '+' : ''}$${(bot.pnl || 0).toFixed(2)}</span>
                                <span>📊 Сделки: ${(bot.openTrades || 0)} открыто / ${(bot.closedTrades || 0)} закрыто</span>
                                <span>📅 До: ${bot.tariffEnd || '--'}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.toggleBot = async function(index, pause, activate = false) {
                try {
                    const resp = await fetch(`/api/user/${userEmail}`);
                    const data = await resp.json();
                    if (!data.user) return;

                    const bots = data.user.bots || [];
                    if (index >= bots.length) return;

                    if (activate) {
                        bots[index].active = true;
                        bots[index].paused = false;
                    } else {
                        bots[index].paused = pause;
                    }

                    const updateResp = await fetch(`/api/user/${userEmail}/bots`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ bots })
                    });

                    if (updateResp.ok) {
                        loadBots();
                    }
                } catch (e) {
                    console.error('Ошибка управления ботом:', e);
                    alert('Ошибка при управлении ботом');
                }
            };

            window.deleteBot = async function(index) {
                if (!confirm('Удалить этого бота?')) return;

                try {
                    const resp = await fetch(`/api/user/${userEmail}`);
                    const data = await resp.json();
                    if (!data.user) return;

                    const bots = data.user.bots || [];
                    if (index >= bots.length) return;

                    bots.splice(index, 1);

                    const updateResp = await fetch(`/api/user/${userEmail}/bots`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ bots })
                    });

                    if (updateResp.ok) {
                        loadBots();
                    }
                } catch (e) {
                    console.error('Ошибка удаления бота:', e);
                    alert('Ошибка при удалении бота');
                }
            };

            function connectWebSocket() {
                if (!userEmail) return;
                
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws?userId=${encodeURIComponent(userEmail)}`;
                
                try {
                    ws = new WebSocket(wsUrl);
                } catch (e) {
                    console.error('WS create error:', e);
                    return;
                }
                
                ws.onopen = () => {
                    console.log('✅ WebSocket подключен');
                    reconnectAttempts = 0;
                    document.getElementById('wsDot').className = 'dot connected';
                    document.getElementById('wsLabel').textContent = 'подключено';
                    updatePnl();
                    loadBots();
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        updatePnlUI(data);
                    } catch (e) {
                        console.error('Ошибка парсинга WebSocket:', e);
                    }
                };
                
                ws.onclose = () => {
                    console.log('❌ WebSocket отключен');
                    document.getElementById('wsDot').className = 'dot disconnected';
                    document.getElementById('wsLabel').textContent = 'отключено';
                    if (reconnectAttempts < MAX_RECONNECT) {
                        reconnectAttempts++;
                        setTimeout(connectWebSocket, 3000 * reconnectAttempts);
                    }
                };
                
                ws.onerror = (error) => {
                    console.error('WebSocket ошибка:', error);
                };
            }

            async function updatePnl() {
                try {
                    const response = await fetch(`/api/pnl/realtime/${userEmail}`);
                    const result = await response.json();
                    if (result.success) {
                        updatePnlUI(result.data);
                    }
                } catch (e) {
                    console.error('Ошибка загрузки PNL:', e);
                }
            }

            function updatePnlUI(data) {
                if (!data) return;

                const balance = data.balance || { initial: 0, current: 0, change: 0, changePercent: 0 };
                document.getElementById('currentBalance').textContent = `$${balance.current.toFixed(2)}`;
                document.getElementById('initialBalance').textContent = `$${balance.initial.toFixed(2)}`;
                
                const changeEl = document.getElementById('balanceChange');
                if (balance.change > 0.01) {
                    changeEl.innerHTML = `<span class="positive">+$${balance.change.toFixed(2)} (+${balance.changePercent.toFixed(1)}%)</span>`;
                } else if (balance.change < -0.01) {
                    changeEl.innerHTML = `<span class="negative">-$${Math.abs(balance.change).toFixed(2)} (${balance.changePercent.toFixed(1)}%)</span>`;
                } else {
                    changeEl.innerHTML = `<span class="neutral">$0.00 (0%)</span>`;
                }

                const positions = data.positions || [];
                const trades = data.trades || { total: 0, open: 0, closed: 0, wins: 0, losses: 0, winRate: 0, totalPnl: 0 };
                
                const totalPnl = trades.totalPnl + positions.reduce((sum, p) => sum + (p.pnl || 0), 0);
                const pnlEl = document.getElementById('totalPnl');
                pnlEl.textContent = `$${totalPnl.toFixed(2)}`;
                pnlEl.className = 'value ' + (totalPnl > 0.01 ? 'positive' : totalPnl < -0.01 ? 'negative' : 'neutral');

                document.getElementById('tradeStats').textContent = trades.total || 0;
                document.getElementById('winCount').textContent = trades.wins || 0;
                document.getElementById('lossCount').textContent = trades.losses || 0;
                document.getElementById('winRate').textContent = (trades.winRate || 0) + '%';
                document.getElementById('openCount').textContent = trades.open || 0;

                const positionsContainer = document.getElementById('openPositions');
                if (!positions || positions.length === 0) {
                    positionsContainer.innerHTML = '<div class="empty">Нет открытых позиций</div>';
                } else {
                    positionsContainer.innerHTML = positions.map(pos => `
                        <div class="trade-item">
                            <div class="left">
                                <strong>${pos.symbol || '--'}</strong>
                                <span class="${pos.side === 'LONG' ? 'side-long' : 'side-short'}">${pos.side || '--'}</span>
                                <span style="color:#94a3b8;font-size:12px;">${(pos.size || 0).toFixed(2)} USDT</span>
                                <span class="badge badge-open">открыта</span>
                            </div>
                            <div class="right">
                                <div>Entry: $${(pos.entry_price || 0).toFixed(4)}</div>
                                <div>Current: $${pos.currentPrice ? pos.currentPrice.toFixed(4) : '--'}</div>
                                <div class="${(pos.pnl || 0) > 0.01 ? 'positive' : (pos.pnl || 0) < -0.01 ? 'negative' : 'neutral'}">
                                    ${(pos.pnl || 0) > 0 ? '+' : ''}$${(pos.pnl || 0).toFixed(2)} (${(pos.pnlPercent || 0).toFixed(1)}%)
                                </div>
                                <button class="btn-close" onclick="closePosition('${pos.id}')">Закрыть</button>
                            </div>
                        </div>
                    `).join('');
                }

                const historyContainer = document.getElementById('tradeHistory');
                const recentTrades = data.recentTrades || [];
                if (!recentTrades || recentTrades.length === 0) {
                    historyContainer.innerHTML = '<div class="empty">Нет завершенных сделок</div>';
                } else {
                    historyContainer.innerHTML = recentTrades.map(trade => `
                        <div class="trade-item">
                            <div class="left">
                                <strong>${trade.symbol || '--'}</strong>
                                <span class="${trade.side === 'LONG' ? 'side-long' : 'side-short'}">${trade.side || '--'}</span>
                                <span style="color:#94a3b8;font-size:12px;">
                                    ${trade.close_time ? new Date(trade.close_time).toLocaleString() : '--'}
                                </span>
                                <span class="badge badge-closed">закрыта</span>
                            </div>
                            <div class="right">
                                <div style="font-size:13px;color:#94a3b8;">
                                    ${(trade.entry_price || 0).toFixed(4)} → ${(trade.close_price || 0).toFixed(4)}
                                </div>
                                <div class="${(trade.pnl || 0) > 0.01 ? 'positive' : (trade.pnl || 0) < -0.01 ? 'negative' : 'neutral'}">
                                    ${(trade.pnl || 0) > 0 ? '+' : ''}$${(trade.pnl || 0).toFixed(2)} (${(trade.pnl_percent || 0).toFixed(1)}%)
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            }

            window.closePosition = async function(positionId) {
                if (!confirm('Закрыть эту позицию?')) return;
                
                try {
                    const response = await fetch('/api/trade/close', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ positionId, email: userEmail })
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        alert(`✅ Позиция закрыта. PNL: $${(result.pnl || 0).toFixed(2)}`);
                        updatePnl();
                    } else {
                        alert('❌ Ошибка: ' + (result.error || 'Неизвестная ошибка'));
                    }
                } catch (e) {
                    console.error('Ошибка закрытия:', e);
                    alert('❌ Ошибка при закрытии позиции');
                }
            };

            window.updatePnl = updatePnl;

            window.logout = function() {
                localStorage.removeItem('smt_user_email');
                if (ws) {
                    try { ws.close(); } catch(e) {}
                }
                window.location.replace('/login.html');
            };

            connectWebSocket();
            
            setInterval(() => {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    updatePnl();
                }
            }, 5000);

            loadBots();

        })();
    </script>

</body>
</html>
