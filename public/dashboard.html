<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot — Личный кабинет</title>
    <style>
        /* === RESET & BASE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e17;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            padding: 20px 16px;
        }
        a {
            color: #4f46e5;
            text-decoration: none;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* === HEADER === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 24px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
        }
        .logo span {
            color: #4f46e5;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-email {
            font-size: 14px;
            color: #94a3b8;
        }
        .btn-logout {
            background: #1e293b;
            color: #e2e8f0;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-logout:hover {
            background: #334155;
        }

        /* === КАРТОЧКА БОТА === */
        .bots-grid {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        .bot-card {
            background: #111827;
            border-radius: 16px;
            padding: 20px;
            border: 3px solid #2a2a4a;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Подсветка рамки */
        .bot-card.status-active {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
        }
        .bot-card.status-paused {
            border-color: #ffcc00;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.15);
        }
        .bot-card.status-stopped {
            border-color: #ff4444;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.15);
        }

        .bot-card .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .bot-card .bot-header h3 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }
        .bot-card .bot-header .bot-status-label {
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
            background: #1e293b;
        }
        .bot-card.status-active .bot-status-label {
            background: #00ff8822;
            color: #00ff88;
        }
        .bot-card.status-paused .bot-status-label {
            background: #ffcc0022;
            color: #ffcc00;
        }
        .bot-card.status-stopped .bot-status-label {
            background: #ff444422;
            color: #ff4444;
        }

        .bot-card .bot-balance-pnl {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1e293b;
        }
        .bot-card .balance-item {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .bot-card .balance-item span {
            font-weight: 600;
            color: #e2e8f0;
        }
        .bot-card .balance-item .pnl-value.positive {
            color: #00ff88;
        }
        .bot-card .balance-item .pnl-value.negative {
            color: #ff4444;
        }

        /* Список позиций */
        .bot-card .positions-list {
            margin-top: 10px;
        }
        .bot-card .positions-list .pos-item {
            font-size: 0.75rem;
            color: #cbd5e1;
            padding: 4px 0;
            border-bottom: 1px solid #1a1a2e;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 4px 10px;
        }
        .bot-card .positions-list .pos-item:last-child {
            border-bottom: none;
        }
        .bot-card .positions-list .pos-item .pos-symbol {
            font-weight: 600;
            color: #fff;
            min-width: 60px;
        }
        .bot-card .positions-list .pos-item .pos-pnl {
            font-weight: 500;
            font-size: 0.8rem;
        }
        .bot-card .positions-list .pos-item .pos-pnl.positive {
            color: #00ff88;
        }
        .bot-card .positions-list .pos-item .pos-pnl.negative {
            color: #ff4444;
        }
        .bot-card .positions-list .pos-item .pos-details {
            color: #64748b;
            font-size: 0.65rem;
            white-space: nowrap;
        }
        .bot-card .no-positions {
            color: #64748b;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* === КНОПКИ УПРАВЛЕНИЯ === */
        .bot-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .bot-actions button {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 6px;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
            line-height: 1;
        }
        .bot-actions button:hover {
            background: #1e293b;
            color: #e2e8f0;
        }
        .bot-actions .btn-delete:hover {
            color: #ef4444;
        }
        .bot-actions .btn-pause:hover {
            color: #facc15;
        }
        .bot-actions .btn-stop:hover {
            color: #ef4444;
        }
        .bot-actions .btn-play:hover {
            color: #22c55e;
        }

        /* === ЗАГЛУШКИ === */
        .no-bots {
            color: #64748b;
            text-align: center;
            padding: 40px 0;
        }
        .error {
            color: #ff4444;
            text-align: center;
            padding: 20px 0;
        }

        /* === АДАПТИВ === */
        @media (max-width: 600px) {
            .bot-card .bot-balance-pnl {
                flex-direction: column;
                gap: 6px;
            }
            .bot-card .positions-list .pos-item {
                font-size: 0.7rem;
            }
            .bot-actions button {
                font-size: 16px;
                padding: 2px 4px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <a href="/" class="logo">SMT <span>Bot</span></a>
            <div class="user-info">
                <span class="user-email" id="userEmail">—</span>
                <button class="btn-logout" id="logoutBtn">Выйти</button>
            </div>
        </header>

        <!-- КАРТОЧКИ БОТОВ -->
        <h2>🤖 Мои боты</h2>
        <div class="bots-grid" id="botsContainer">
            <!-- Сюда будут подгружены карточки -->
        </div>
    </div>

    <script>
        // ============================================
        //  ПОЛУЧЕНИЕ СТАТУСА БОТА
        // ============================================

        async function getBotStatus(email, botId) {
            try {
                const response = await fetch(`/api/bot/list/${email}`);
                const data = await response.json();
                const bot = data.bots.find(b => b.id === botId);
                return bot || { paused: false, active: true };
            } catch (error) {
                console.error('Ошибка получения статуса бота:', error);
                return { paused: false, active: true };
            }
        }

        // ============================================
        //  УПРАВЛЕНИЕ БОТАМИ
        // ============================================

        async function togglePause(email, botId) {
            try {
                const currentStatus = await getBotStatus(email, botId);
                const newPaused = !currentStatus.paused;

                const response = await fetch('/api/bot/update', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        botId,
                        updates: { paused: newPaused }
                    })
                });

                const data = await response.json();
                if (data.success) {
                    loadBotsDashboard();
                }
            } catch (error) {
                console.error('Ошибка переключения паузы:', error);
            }
        }

        async function toggleActive(email, botId) {
            try {
                const currentStatus = await getBotStatus(email, botId);
                const newActive = !currentStatus.active;

                const response = await fetch('/api/bot/update', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        botId,
                        updates: { active: newActive }
                    })
                });

                const data = await response.json();
                if (data.success) {
                    loadBotsDashboard();
                }
            } catch (error) {
                console.error('Ошибка переключения активности:', error);
            }
        }

        async function deleteBot(email, botId) {
            if (!confirm(`Удалить бота?`)) return;

            try {
                const response = await fetch('/api/bot/delete', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, botId })
                });

                const data = await response.json();
                if (data.success) {
                    loadBotsDashboard();
                } else {
                    alert('Ошибка удаления бота: ' + (data.error || 'неизвестная ошибка'));
                }
            } catch (error) {
                console.error('Ошибка удаления бота:', error);
                alert('Ошибка удаления бота');
            }
        }

        // ============================================
        //  ЗАГРУЗКА ДАННЫХ ДЛЯ КАРТОЧЕК БОТОВ
        // ============================================

        async function loadBotsDashboard() {
            try {
                const user = JSON.parse(localStorage.getItem('smt_user'));
                if (!user || !user.email) {
                    document.getElementById('botsContainer').innerHTML = '<p class="no-bots">Пожалуйста, войдите в систему.</p>';
                    return;
                }

                document.getElementById('userEmail').textContent = user.email;

                const botsResponse = await fetch(`/api/bot/list/${user.email}`);
                const botsData = await botsResponse.json();

                if (!botsData.bots || botsData.bots.length === 0) {
                    document.getElementById('botsContainer').innerHTML = '<p class="no-bots">У вас нет созданных ботов. Создайте первого!</p>';
                    return;
                }

                let html = '';

                for (const bot of botsData.bots) {
                    try {
                        const dashboardResponse = await fetch(`/api/bot/dashboard/${user.email}/${bot.id}`);
                        const dashboardData = await dashboardResponse.json();

                        if (!dashboardData.success) continue;

                        const data = dashboardData.data;
                        const statusClass = `status-${data.status}`;
                        const statusLabel = data.status === 'active' ? '🟢 Активен' :
                            data.status === 'paused' ? '🟡 Пауза' : '🔴 Остановлен';

                        // Приводим строки к числам
                        const balance = parseFloat(data.balance) || 0;
                        const totalPnl = parseFloat(data.totalPnl) || 0;

                        let positionsHtml = '';
                        if (data.positions && data.positions.length > 0) {
                            data.positions.forEach(pos => {
                                const pnl = parseFloat(pos.pnl) || 0;
                                const margin = parseFloat(pos.margin) || 0;
                                const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                                positionsHtml += `
                                    <div class="pos-item">
                                        <span class="pos-symbol">${pos.symbol || '—'}</span>
                                        <span class="pos-details">${pos.side || '—'} | ${pos.leverage || 10}x | Маржа: $${margin.toFixed(2)}</span>
                                        <span class="pos-pnl ${pnlClass}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</span>
                                        <span class="pos-details">SL: ${pos.stopLoss || '—'} | TP: ${pos.takeProfit || '—'}</span>
                                    </div>
                                `;
                            });
                        } else {
                            positionsHtml = `<div class="no-positions">Нет открытых позиций</div>`;
                        }

                        const totalPnlClass = totalPnl >= 0 ? 'positive' : 'negative';

                        html += `
                            <div class="bot-card ${statusClass}" data-bot-id="${bot.id}">
                                <div class="bot-header">
                                    <h3>🤖 ${data.bot.name || 'Без имени'}</h3>
                                    <div class="bot-actions">
                                        <button class="btn-pause" onclick="togglePause('${user.email}', '${bot.id}')" title="Пауза/Возобновить">
                                            ${data.status === 'paused' ? '▶️' : '⏸️'}
                                        </button>
                                        <button class="btn-stop" onclick="toggleActive('${user.email}', '${bot.id}')" title="Остановить/Запустить">
                                            ${data.status === 'stopped' ? '▶️' : '⏹️'}
                                        </button>
                                        <button class="btn-delete" onclick="deleteBot('${user.email}', '${bot.id}')" title="Удалить бота">
                                            🗑️
                                        </button>
                                    </div>
                                </div>
                                <div class="bot-balance-pnl">
                                    <div class="balance-item">💰 Баланс: <span>$${balance.toFixed(2)}</span></div>
                                    <div class="balance-item">📊 Общий PNL: <span class="pnl-value ${totalPnlClass}">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}</span></div>
                                </div>
                                <div class="positions-list">
                                    ${positionsHtml}
                                </div>
                            </div>
                        `;

                    } catch (error) {
                        console.error(`Ошибка загрузки данных для бота ${bot.id}:`, error);
                    }
                }

                document.getElementById('botsContainer').innerHTML = html;

            } catch (error) {
                console.error('Ошибка загрузки дашборда ботов:', error);
                document.getElementById('botsContainer').innerHTML = '<p class="error">Ошибка загрузки данных. Попробуйте обновить страницу.</p>';
            }
        }

        // ============================================
        //  ВЫХОД
        // ============================================

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('smt_user');
            window.location.href = '/login.html';
        });

        // ============================================
        //  ЗАПУСК
        // ============================================

        document.addEventListener('DOMContentLoaded', loadBotsDashboard);
        setInterval(loadBotsDashboard, 15000);
    </script>

</body>
</html>
