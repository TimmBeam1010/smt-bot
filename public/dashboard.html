<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot — Личный кабинет</title>
    <style>
        /* --- RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e17;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            padding: 0 16px;
        }
        a {
            color: #4f46e5;
            text-decoration: none;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #1e293b;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
        }
        .logo span {
            color: #4f46e5;
        }
        .btn-danger {
            background: #dc2626;
            color: #fff !important;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .user-email {
            color: #94a3b8;
            font-size: 13px;
            margin-right: 8px;
        }

        /* --- CARDS --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }
        .card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 16px;
        }
        .card h3 {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card .value {
            font-size: 22px;
            font-weight: 700;
            margin-top: 4px;
        }
        .card .value.positive { color: #22c55e; }
        .card .value.negative { color: #ef4444; }
        .card .sub {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }

        /* --- TABLES --- */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 24px 0 12px;
        }
        .table-wrap {
            overflow-x: auto;
            background: #111827;
            border-radius: 12px;
            border: 1px solid #1e293b;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            text-align: left;
            padding: 10px 12px;
            background: #0f172a;
            color: #94a3b8;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
        }
        td {
            padding: 10px 12px;
            border-top: 1px solid #1e293b;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge.long { background: #22c55e20; color: #22c55e; }
        .badge.short { background: #ef444420; color: #ef4444; }
        .badge.active { background: #22c55e20; color: #22c55e; }
        .badge.paused { background: #f59e0b20; color: #f59e0b; }
        .badge.inactive { background: #64748b20; color: #64748b; }

        /* --- BOT CONTROLS --- */
        .bot-controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .bot-controls button {
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #1e293b;
            background: transparent;
            color: #94a3b8;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bot-controls button:hover {
            background: #1e293b;
            color: #fff;
        }
        .bot-controls .pause-btn.active { color: #f59e0b; border-color: #f59e0b; }
        .bot-controls .pause-btn:hover { background: #f59e0b20; }
        .bot-controls .activate-btn.active { color: #22c55e; border-color: #22c55e; }
        .bot-controls .activate-btn:hover { background: #22c55e20; }
        .bot-controls .delete-btn { color: #ef4444; border-color: #ef4444; }
        .bot-controls .delete-btn:hover { background: #ef444420; }

        /* --- LOGIN FORM --- */
        .login-form {
            max-width: 400px;
            margin: 60px auto;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 32px 24px;
        }
        .login-form h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            background: #0a0e17;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .login-form input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .login-form button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }
        .login-form button:hover {
            background: #4338ca;
        }
        .login-form .error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
        .login-form .register-link {
            text-align: center;
            margin-top: 16px;
            color: #94a3b8;
            font-size: 14px;
        }

        /* --- FOOTER --- */
        .footer {
            border-top: 1px solid #1e293b;
            padding: 20px 0;
            text-align: center;
            color: #64748b;
            font-size: 12px;
            margin-top: 30px;
        }

        /* --- PLACEHOLDER --- */
        .placeholder {
            color: #64748b;
            text-align: center;
            padding: 20px 0;
            font-size: 13px;
        }

        /* --- MOBILE --- */
        @media (min-width: 768px) {
            .dashboard-grid { grid-template-columns: repeat(4, 1fr); }
            body { padding: 0 20px; }
            .logo { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <a href="/" class="logo">SMT <span>Bot</span></a>
            <div>
                <span class="user-email" id="userEmail"></span>
                <button class="btn-danger" id="logoutBtn">Выйти</button>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <div id="mainContent"></div>

        <!-- FOOTER -->
        <footer class="footer">
            &copy; 2026 SMT Bot. Не является инвестиционной рекомендацией.
        </footer>
    </div>

    <script>
        // --- UTILITIES ---
        function getUser() {
            try { return JSON.parse(localStorage.getItem('smt_user')); } catch { return null; }
        }
        function saveUser(user) { localStorage.setItem('smt_user', JSON.stringify(user)); }
        function clearUser() { localStorage.removeItem('smt_user'); }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            clearUser();
            window.location.href = '/';
        });

        // --- API CALLS ---
        async function updateBot(email, index, data) {
            const res = await fetch(`/api/user/bots/${email}/${index}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return res.json();
        }

        async function deleteBot(email, index) {
            const res = await fetch(`/api/user/bots/${email}/${index}`, {
                method: 'DELETE'
            });
            return res.json();
        }

        // --- RENDER DASHBOARD ---
        async function renderDashboard(user) {
            const container = document.getElementById('mainContent');
            document.getElementById('userEmail').textContent = user.email || '';

            try {
                const demoRes = await fetch(`/api/demo/${encodeURIComponent(user.email)}`);
                const demoData = await demoRes.json();

                const signalsRes = await fetch(`/api/signals/user/${encodeURIComponent(user.email)}`);
                const signalsData = await signalsRes.json();

                const balance = demoData?.data?.balance || 0;
                const equity = demoData?.data?.equity || 0;
                const totalPnl = demoData?.data?.totalPnl || 0;
                const positions = demoData?.data?.positions || [];
                const signals = signalsData?.signals || [];
                const bots = user.bots || [];

                // --- STATS ---
                let html = `
                    <div class="dashboard-grid">
                        <div class="card"><h3>💰 Баланс</h3><div class="value">$${balance.toFixed(2)}</div></div>
                        <div class="card"><h3>📈 Капитал</h3><div class="value">$${equity.toFixed(2)}</div></div>
                        <div class="card"><h3>📊 PNL</h3><div class="value ${totalPnl >= 0 ? 'positive' : 'negative'}">${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)}$</div></div>
                        <div class="card"><h3>📡 Сигналы</h3><div class="value">${signals.length}</div></div>
                    </div>
                `;

                // --- SIGNALS ---
                html += `<h2 class="section-title">📡 Последние сигналы</h2>`;
                if (signals.length === 0) {
                    html += `<div class="table-wrap"><div class="placeholder">Нет сигналов</div></div>`;
                } else {
                    html += `<div class="table-wrap"><table>
                        <thead><tr><th>Актив</th><th>Тип</th><th>Цена</th><th>Дата</th></tr></thead>
                        <tbody>`;
                    signals.slice(0, 10).forEach(s => {
                        html += `<tr>
                            <td><strong>${s.symbol}</strong></td>
                            <td><span class="badge ${s.side === 'LONG' ? 'long' : 'short'}">${s.side}</span></td>
                            <td>$${parseFloat(s.entry_price).toFixed(4)}</td>
                            <td>${new Date(s.created_at).toLocaleDateString()}</td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                // --- POSITIONS ---
                html += `<h2 class="section-title">🔓 Открытые позиции</h2>`;
                if (positions.length === 0) {
                    html += `<div class="table-wrap"><div class="placeholder">Нет открытых позиций</div></div>`;
                } else {
                    html += `<div class="table-wrap"><table>
                        <thead><tr><th>Актив</th><th>Тип</th><th>Цена</th><th>PNL</th></tr></thead>
                        <tbody>`;
                    positions.forEach(p => {
                        const pnl = p.pnl || 0;
                        html += `<tr>
                            <td><strong>${p.symbol}</strong></td>
                            <td><span class="badge ${p.side === 'LONG' ? 'long' : 'short'}">${p.side}</span></td>
                            <td>$${parseFloat(p.entry_price).toFixed(4)}</td>
                            <td class="${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}$</td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                // --- BOTS WITH CONTROLS ---
                html += `<h2 class="section-title">🤖 Мои боты</h2>`;
                if (bots.length === 0) {
                    html += `<div class="table-wrap"><div class="placeholder">Нет подключенных ботов</div></div>`;
                } else {
                    html += `<div class="table-wrap"><table>
                        <thead><tr><th>Биржа</th><th>Тариф</th><th>PNL</th><th>Статус</th><th>Управление</th></tr></thead>
                        <tbody>`;
                    bots.forEach((bot, index) => {
                        const statusText = bot.active ? (bot.paused ? '⏸ Пауза' : '✅ Активен') : '⛔ Отключен';
                        const statusClass = bot.active ? (bot.paused ? 'paused' : 'active') : 'inactive';
                        const pnl = bot.pnl || 0;

                        html += `<tr>
                            <td>${bot.exchange || 'demo'}</td>
                            <td>${bot.tariff || 'Базовый'}</td>
                            <td class="${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}$</td>
                            <td><span class="badge ${statusClass}">${statusText}</span></td>
                            <td>
                                <div class="bot-controls" data-index="${index}">
                                    <button class="pause-btn ${bot.active && bot.paused ? 'active' : ''}" 
                                            data-action="pause" 
                                            title="${bot.paused ? 'Возобновить' : 'Пауза'}">
                                        ${bot.paused ? '▶️' : '⏸️'}
                                    </button>
                                    <button class="activate-btn ${bot.active ? 'active' : ''}" 
                                            data-action="activate"
                                            title="${bot.active ? 'Отключить' : 'Активировать'}">
                                        ${bot.active ? '✅' : '⛔'}
                                    </button>
                                    <button class="delete-btn" 
                                            data-action="delete"
                                            title="Удалить бота">
                                        🗑️
                                    </button>
                                </div>
                            </td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                container.innerHTML = html;

                // --- ATTACH EVENT LISTENERS TO BOT CONTROLS ---
                document.querySelectorAll('.bot-controls').forEach((controls) => {
                    const index = parseInt(controls.dataset.index);
                    controls.querySelectorAll('button').forEach((btn) => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const action = btn.dataset.action;
                            const email = user.email;

                            try {
                                let result;
                                if (action === 'pause') {
                                    const currentPaused = btn.classList.contains('active');
                                    result = await updateBot(email, index, { paused: !currentPaused });
                                } else if (action === 'activate') {
                                    const currentActive = btn.classList.contains('active');
                                    result = await updateBot(email, index, { active: !currentActive });
                                } else if (action === 'delete') {
                                    if (!confirm('Удалить этого бота?')) return;
                                    result = await deleteBot(email, index);
                                }

                                if (result.success) {
                                    // Обновляем пользователя в localStorage
                                    saveUser(result.user);
                                    // Перерисовываем дашборд
                                    renderDashboard(result.user);
                                } else {
                                    alert('Ошибка: ' + (result.error || 'Неизвестная ошибка'));
                                }
                            } catch (err) {
                                alert('Ошибка соединения: ' + err.message);
                            }
                        });
                    });
                });

            } catch (err) {
                console.error('Ошибка загрузки дашборда:', err);
                container.innerHTML = `<div class="card" style="margin-top:30px;text-align:center;padding:40px;"><h3>❌ Ошибка</h3><p style="color:#94a3b8;">${err.message}</p></div>`;
            }
        }

        // --- LOGIN FORM ---
        function renderLoginForm() {
            const container = document.getElementById('mainContent');
            document.getElementById('userEmail').textContent = '';
            container.innerHTML = `
                <div class="login-form">
                    <h2>🔐 Вход в терминал</h2>
                    <form id="loginForm">
                        <input type="email" id="loginEmail" placeholder="Email" required>
                        <input type="password" id="loginPassword" placeholder="Пароль" required>
                        <button type="submit">Войти</button>
                        <div id="loginError" class="error"></div>
                    </form>
                    <div class="register-link">
                        Нет аккаунта? <a href="/login.html">Зарегистрироваться</a>
                    </div>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const errorEl = document.getElementById('loginError');

                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok && data.user) {
                        saveUser(data.user);
                        window.location.reload();
                    } else {
                        errorEl.textContent = data.error || 'Ошибка входа';
                    }
                } catch (err) {
                    errorEl.textContent = 'Ошибка соединения с сервером';
                }
            });
        }

        // --- INIT ---
        const user = getUser();
        if (user && user.email) {
            renderDashboard(user);
        } else {
            renderLoginForm();
        }
    </script>

</body>
</html>
