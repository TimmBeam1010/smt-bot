<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 SMT Bot — Личный кабинет</title>
    <style>
        body {
            background: #0a0e17;
            color: #fff;
            font-family: sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1, h2, h3 {
            color: #fff;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2d3748;
        }
        .header a {
            color: #4f46e5;
            text-decoration: none;
            margin-left: 16px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .card {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .stat {
            background: #0a0e17;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }
        .stat .value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 4px;
        }
        .stat .label {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
        }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        .neutral { color: #f59e0b; }
        .trade-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #2d3748;
            align-items: center;
        }
        .trade-item .side-long { color: #10b981; }
        .trade-item .side-short { color: #ef4444; }
        .btn-close {
            padding: 4px 12px;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-close:hover {
            background: #dc2626;
        }
        .empty {
            color: #94a3b8;
            text-align: center;
            padding: 20px;
        }
        .refresh-btn {
            background: #4f46e5;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 12px;
        }
        .refresh-btn:hover {
            background: #4338ca;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        .status-open {
            background: #065f46;
            color: #6ee7b7;
        }
        .status-closed {
            background: #1e293b;
            color: #94a3b8;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
            .trade-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📊 SMT Bot</h1>
        <div>
            <span id="userEmail" style="color:#94a3b8;margin-right:16px;"></span>
            <a href="/index.html">Главная</a>
            <a href="/signals.html">Сигналы</a>
            <a href="/admin.html">Админка</a>
            <a href="/chat.html">Чат</a>
            <a href="#" onclick="logout()">Выйти</a>
        </div>
    </div>

    <div class="card">
        <div class="flex-between">
            <h2>📊 Портфель в реальном времени</h2>
            <button class="refresh-btn" onclick="updatePnl()">🔄 Обновить</button>
        </div>
        <div class="grid" id="pnlGrid">
            <div class="stat">
                <div class="label">Баланс</div>
                <div class="value" id="currentBalance">$0.00</div>
                <div style="font-size:14px;color:#94a3b8;">
                    <span id="initialBalance">$0.00</span>
                    <span id="balanceChange"></span>
                </div>
            </div>
            <div class="stat">
                <div class="label">Общий PNL</div>
                <div class="value" id="totalPnl">$0.00</div>
            </div>
            <div class="stat">
                <div class="label">Сделки</div>
                <div class="value" id="tradeStats">0</div>
                <div style="font-size:14px;color:#94a3b8;">
                    🟢 <span id="winCount">0</span> | 🔴 <span id="lossCount">0</span>
                </div>
            </div>
            <div class="stat">
                <div class="label">Win Rate</div>
                <div class="value" id="winRate">0%</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>📈 Открытые позиции (<span id="openCount">0</span>)</h3>
        <div id="openPositions"></div>
    </div>

    <div class="card">
        <h3>📜 История сделок</h3>
        <div id="tradeHistory"></div>
    </div>

    <script>
        const userEmail = localStorage.getItem('userEmail');
        if (!userEmail) {
            window.location.href = '/login.html';
        }
        document.getElementById('userEmail').textContent = userEmail;

        let ws = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT = 5;

        function connectWebSocket() {
            if (!userEmail) return;
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws?userId=${encodeURIComponent(userEmail)}`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('✅ WebSocket подключен');
                reconnectAttempts = 0;
                updatePnl();
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    updatePnlUI(data);
                } catch (e) {
                    console.error('Ошибка парсинга WebSocket:', e);
                }
            };
            
            ws.onclose = () => {
                console.log('❌ WebSocket отключен');
                if (reconnectAttempts < MAX_RECONNECT) {
                    reconnectAttempts++;
                    setTimeout(connectWebSocket, 3000 * reconnectAttempts);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket ошибка:', error);
            };
        }

        async function updatePnl() {
            try {
                const response = await fetch(`/api/pnl/realtime/${userEmail}`);
                const result = await response.json();
                if (result.success) {
                    updatePnlUI(result.data);
                }
            } catch (e) {
                console.error('Ошибка загрузки PNL:', e);
            }
        }

        function updatePnlUI(data) {
            if (!data) return;

            const balance = data.balance;
            document.getElementById('currentBalance').textContent = `$${balance.current.toFixed(2)}`;
            document.getElementById('initialBalance').textContent = `$${balance.initial.toFixed(2)}`;
            
            const changeEl = document.getElementById('balanceChange');
            if (balance.change > 0.01) {
                changeEl.innerHTML = `<span class="positive">+$${balance.change.toFixed(2)} (+${balance.changePercent.toFixed(1)}%)</span>`;
            } else if (balance.change < -0.01) {
                changeEl.innerHTML = `<span class="negative">-$${Math.abs(balance.change).toFixed(2)} (${balance.changePercent.toFixed(1)}%)</span>`;
            } else {
                changeEl.innerHTML = `<span class="neutral">$0.00 (0%)</span>`;
            }

            const totalPnl = data.trades.totalPnl + data.positions.reduce((sum, p) => sum + (p.pnl || 0), 0);
            const pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = `$${totalPnl.toFixed(2)}`;
            pnlEl.className = 'value ' + (totalPnl > 0.01 ? 'positive' : totalPnl < -0.01 ? 'negative' : 'neutral');

            const trades = data.trades;
            document.getElementById('tradeStats').textContent = trades.total;
            document.getElementById('winCount').textContent = trades.wins;
            document.getElementById('lossCount').textContent = trades.losses;
            document.getElementById('winRate').textContent = trades.winRate + '%';
            document.getElementById('openCount').textContent = trades.open;

            const positionsContainer = document.getElementById('openPositions');
            if (data.positions.length === 0) {
                positionsContainer.innerHTML = '<div class="empty">Нет открытых позиций</div>';
            } else {
                positionsContainer.innerHTML = data.positions.map(pos => `
                    <div class="trade-item">
                        <div>
                            <strong>${pos.symbol}</strong>
                            <span class="${pos.side === 'LONG' ? 'side-long' : 'side-short'}">${pos.side}</span>
                            <span style="color:#94a3b8;font-size:12px;margin-left:8px;">${pos.size.toFixed(2)} USDT</span>
                            <span class="status-badge status-open">открыта</span>
                        </div>
                        <div style="text-align:right;">
                            <div>Entry: $${pos.entry_price.toFixed(4)}</div>
                            <div>Current: $${pos.currentPrice ? pos.currentPrice.toFixed(4) : '--'}</div>
                            <div class="${pos.pnl > 0.01 ? 'positive' : pos.pnl < -0.01 ? 'negative' : 'neutral'}">
                                ${pos.pnl > 0 ? '+' : ''}$${pos.pnl ? pos.pnl.toFixed(2) : '0.00'} (${pos.pnlPercent ? pos.pnlPercent.toFixed(1) : '0'}%)
                            </div>
                            <button class="btn-close" onclick="closePosition('${pos.id}')">Закрыть</button>
                        </div>
                    </div>
                `).join('');
            }

            const historyContainer = document.getElementById('tradeHistory');
            if (!data.recentTrades || data.recentTrades.length === 0) {
                historyContainer.innerHTML = '<div class="empty">Нет завершенных сделок</div>';
            } else {
                historyContainer.innerHTML = data.recentTrades.map(trade => `
                    <div class="trade-item">
                        <div>
                            <strong>${trade.symbol}</strong>
                            <span class="${trade.side === 'LONG' ? 'side-long' : 'side-short'}">${trade.side}</span>
                            <span style="color:#94a3b8;font-size:12px;margin-left:8px;">
                                ${new Date(trade.close_time).toLocaleString()}
                            </span>
                            <span class="status-badge status-closed">закрыта</span>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:13px;color:#94a3b8;">
                                ${trade.entry_price.toFixed(4)} → ${trade.close_price.toFixed(4)}
                            </div>
                            <div class="${trade.pnl > 0.01 ? 'positive' : trade.pnl < -0.01 ? 'negative' : 'neutral'}">
                                ${trade.pnl > 0 ? '+' : ''}$${trade.pnl ? trade.pnl.toFixed(2) : '0.00'} (${trade.pnl_percent ? trade.pnl_percent.toFixed(1) : '0'}%)
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function closePosition(positionId) {
            if (!confirm('Закрыть эту позицию?')) return;
            
            try {
                const response = await fetch('/api/trade/close', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ positionId, email: userEmail })
                });
                const result = await response.json();
                
                if (result.success) {
                    alert(`✅ Позиция закрыта. PNL: $${result.pnl.toFixed(2)}`);
                    updatePnl();
                } else {
                    alert('❌ Ошибка: ' + (result.error || 'Неизвестная ошибка'));
                }
            } catch (e) {
                console.error('Ошибка закрытия:', e);
                alert('❌ Ошибка при закрытии позиции');
            }
        }

        function logout() {
            localStorage.removeItem('userEmail');
            window.location.href = '/login.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
            
            setInterval(() => {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    updatePnl();
                }
            }, 5000);
        });
    </script>

</body>
</html>
