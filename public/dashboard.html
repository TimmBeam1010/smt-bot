<!DOCTYPE html>
<html>
<head>
    <title>SMT Bot Dashboard</title>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a0a; color: #00ff88; font-family: monospace; padding: 20px; }
        .stat { display: inline-block; margin: 10px; padding: 15px; background: #1a1a1a; border: 1px solid #00ff88; border-radius: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #888; }
        .signal { padding: 5px 10px; margin: 5px; border-radius: 4px; }
        .signal-long { background: #00aa44; color: #fff; }
        .signal-short { background: #cc2244; color: #fff; }
        .signal-high { border: 2px solid #ffdd00; }
        .signal-medium { border: 1px solid #ffaa00; }
        .log { background: #111; padding: 10px; max-height: 300px; overflow-y: scroll; font-size: 12px; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid #222; }
        .log-time { color: #666; }
        .log-info { color: #00ff88; }
        .log-warn { color: #ffaa00; }
        .log-error { color: #ff2244; }
        .refresh { background: #00ff88; color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📊 SMT Bot Dashboard</h1>
    <div id="stats"></div>
    <div id="signals"></div>
    <div id="log"></div>
    <button class="refresh" onclick="fetchData()">🔄 Обновить</button>
    
    <script>
        async function fetchData() {
            try {
                // Получаем статистику
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                document.getElementById('stats').innerHTML = `
                    <div class="stat"><span class="stat-label">Баланс</span><br><span class="stat-value">$${stats.balance || 0}</span></div>
                    <div class="stat"><span class="stat-label">Позиции</span><br><span class="stat-value">${stats.positions || 0}</span></div>
                    <div class="stat"><span class="stat-label">Винрейт</span><br><span class="stat-value">${stats.winRate || 0}%</span></div>
                    <div class="stat"><span class="stat-label">Просадка</span><br><span class="stat-value">${stats.drawdown || 0}%</span></div>
                `;
                
                // Получаем сигналы
                const signalsRes = await fetch('/api/signals/user/11');
                const signals = await signalsRes.json();
                document.getElementById('signals').innerHTML = signals.signals.slice(0, 10).map(s => `
                    <div class="signal signal-${s.side.toLowerCase()} signal-${s.confidence}">
                        ${s.symbol} ${s.side} @ ${s.entry_price} (${s.confidence})
                    </div>
                `).join('');
                
                // Получаем логи
                const logsRes = await fetch('/api/logs');
                const logs = await logsRes.json();
                document.getElementById('log').innerHTML = logs.slice(0, 20).map(l => `
                    <div class="log-entry">
                        <span class="log-time">${l.time}</span>
                        <span class="log-${l.level}">${l.message}</span>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Ошибка загрузки данных:', e);
            }
        }
        
        // Автообновление каждые 5 секунд
        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
