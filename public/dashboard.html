<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot — Личный кабинет</title>
    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e17;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            padding: 0 16px;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 16px; }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #1e293b;
        }
        .logo { font-size: 20px; font-weight: 700; color: #fff; cursor: pointer; }
        .logo span { color: #4f46e5; }
        .btn-danger {
            background: #dc2626;
            color: #fff !important;
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-danger:hover { background: #b91c1c; }
        .user-email { color: #94a3b8; font-size: 13px; margin-right: 8px; }

        /* --- BUTTONS --- */
        .btn-primary {
            background: #4f46e5;
            color: #fff !important;
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary {
            background: #1e293b;
            color: #fff !important;
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-secondary:hover { background: #2d3748; }
        .btn-danger-sm {
            background: #dc262620;
            color: #ef4444 !important;
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid #ef444440;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-danger-sm:hover { background: #dc262640; }
        .btn-success-sm {
            background: #22c55e20;
            color: #22c55e !important;
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid #22c55e40;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-success-sm:hover { background: #22c55e40; }

        /* --- CARDS & SECTIONS --- */
        .section {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .section-title small {
            font-size: 13px;
            font-weight: 400;
            color: #94a3b8;
        }

        /* --- FORM --- */
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #0a0e17;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        /* --- EXCHANGE LIST --- */
        .exchange-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
        }
        .exchange-item:last-child { border-bottom: none; }
        .exchange-item .info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .exchange-item .name { font-weight: 600; }
        .exchange-item .status { font-size: 13px; }
        .status.active { color: #22c55e; }
        .status.inactive { color: #64748b; }
        .exchange-item .actions { display: flex; gap: 8px; }

        /* --- BOT LIST --- */
        .bot-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
        }
        .bot-item:last-child { border-bottom: none; }
        .bot-item .info { display: flex; flex-direction: column; gap: 4px; }
        .bot-item .name { font-weight: 600; }
        .bot-item .details { font-size: 13px; color: #94a3b8; }
        .bot-item .actions { display: flex; gap: 6px; flex-wrap: wrap; }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge.active { background: #22c55e20; color: #22c55e; }
        .badge.paused { background: #f59e0b20; color: #f59e0b; }
        .badge.inactive { background: #64748b20; color: #64748b; }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center;
            padding: 30px 0;
            color: #64748b;
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 8px; }

        /* --- MESSAGES --- */
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin: 12px 0;
            font-size: 14px;
        }
        .message.success { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e40; }
        .message.error { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }
        .message.info { background: #4f46e520; color: #4f46e5; border: 1px solid #4f46e540; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .exchange-item { flex-direction: column; align-items: flex-start; gap: 8px; }
            .bot-item { flex-direction: column; align-items: flex-start; gap: 8px; }
            .header { flex-wrap: wrap; gap: 8px; }
        }
        @media (min-width: 768px) {
            body { padding: 0 20px; }
            .logo { font-size: 24px; }
        }

        /* --- LOGIN FORM --- */
        .login-form {
            max-width: 400px;
            margin: 60px auto;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 32px 24px;
        }
        .login-form h2 { text-align: center; margin-bottom: 20px; font-size: 22px; }
        .login-form input { width: 100%; padding: 12px; background: #0a0e17; border: 1px solid #1e293b; border-radius: 8px; color: #fff; margin-bottom: 12px; font-size: 14px; }
        .login-form input:focus { outline: none; border-color: #4f46e5; }
        .login-form button { width: 100%; padding: 12px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px; }
        .login-form button:hover { background: #4338ca; }
        .login-form .error { color: #ef4444; font-size: 14px; margin-top: 8px; text-align: center; }
        .login-form .register-link { text-align: center; margin-top: 16px; color: #94a3b8; font-size: 14px; }
        .login-form .register-link a { color: #4f46e5; }

        .footer {
            border-top: 1px solid #1e293b;
            padding: 20px 0;
            text-align: center;
            color: #64748b;
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <a href="/" class="logo">SMT <span>Bot</span></a>
            <div>
                <span class="user-email" id="userEmail"></span>
                <button class="btn-danger" id="logoutBtn">Выйти</button>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <div id="mainContent"></div>

        <!-- FOOTER -->
        <footer class="footer">
            &copy; 2026 SMT Bot. Не является инвестиционной рекомендацией.
        </footer>
    </div>

    <script>
        // ============================================
        //  UTILITIES
        // ============================================
        function getUser() {
            try { return JSON.parse(localStorage.getItem('smt_user')); } catch { return null; }
        }
        function saveUser(user) { localStorage.setItem('smt_user', JSON.stringify(user)); }
        function clearUser() { localStorage.removeItem('smt_user'); }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            clearUser();
            window.location.href = '/';
        });

        // ============================================
        //  API CALLS
        // ============================================
        const API_BASE = '/api';

        async function apiCall(endpoint, options = {}) {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...options.headers }
            });
            return res.json();
        }

        // ============================================
        //  RENDER DASHBOARD
        // ============================================
        async function renderDashboard(user) {
            const container = document.getElementById('mainContent');
            document.getElementById('userEmail').textContent = user.email || '';

            try {
                // Загружаем данные
                const exchangesRes = await fetch(`${API_BASE}/exchange/list/${encodeURIComponent(user.email)}`);
                const exchangesData = await exchangesRes.json();

                const bots = user.bots || [];
                const connectedExchanges = exchangesData.exchanges || [];
                const hasExchange = connectedExchanges.length > 0;

                let html = '';

                // --- СООБЩЕНИЕ, ЕСЛИ НЕТ БИРЖ ---
                if (!hasExchange) {
                    html += `
                        <div class="message info">
                            🔐 Для создания бота необходимо подключить хотя бы одну биржу по API.
                            Ключи шифруются и хранятся в безопасности.
                        </div>
                    `;
                }

                // --- БЛОК: ПОДКЛЮЧЕНИЕ БИРЖИ ---
                html += `
                    <div class="section">
                        <div class="section-title">🔌 Подключение биржи</div>
                        <form id="connectExchangeForm">
                            <div class="form-group">
                                <label for="exchangeSelect">Биржа</label>
                                <select id="exchangeSelect" required>
                                    <option value="binance">Binance</option>
                                    <option value="bybit">Bybit</option>
                                    <option value="okx">OKX</option>
                                    <option value="bingx">BingX</option>
                                </select>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="apiKeyInput">API Key</label>
                                    <input type="text" id="apiKeyInput" placeholder="Введите API ключ" required>
                                </div>
                                <div class="form-group">
                                    <label for="secretKeyInput">Secret Key</label>
                                    <input type="password" id="secretKeyInput" placeholder="Введите Secret ключ" required>
                                </div>
                            </div>
                            <div class="form-hint">
                                ⚠️ Ключи нужны только для чтения баланса и торговли. Они шифруются перед сохранением.
                            </div>
                            <button type="submit" class="btn-primary" style="margin-top:12px;">✅ Подключить биржу</button>
                            <div id="connectMessage" style="margin-top:8px;"></div>
                        </form>
                    </div>
                `;

                // --- БЛОК: МОИ БИРЖИ ---
                html += `
                    <div class="section">
                        <div class="section-title">🏦 Мои биржи <small>(${connectedExchanges.length})</small></div>
                        <div id="exchangeList">
                `;

                if (connectedExchanges.length === 0) {
                    html += `<div class="empty-state"><div class="icon">🔌</div><p>Нет подключенных бирж</p></div>`;
                } else {
                    html += `<div id="exchangeItems">`;
                    for (const ex of connectedExchanges) {
                        const statusClass = ex.enabled ? 'active' : 'inactive';
                        const statusText = ex.enabled ? '✅ Активна' : '⛔ Отключена';
                        html += `
                            <div class="exchange-item" data-exchange="${ex.exchange}">
                                <div class="info">
                                    <span class="name">${ex.exchange.toUpperCase()}</span>
                                    <span class="status ${statusClass}">${statusText}</span>
                                    ${ex.last_checked ? `<span style="font-size:12px;color:#64748b;">(проверено: ${new Date(ex.last_checked).toLocaleDateString()})</span>` : ''}
                                </div>
                                <div class="actions">
                                    <button class="btn-danger-sm" onclick="disconnectExchange('${user.email}','${ex.exchange}')">❌ Отключить</button>
                                </div>
                            </div>
                        `;
                    }
                    html += `</div>`;
                }

                html += `
                        </div>
                    </div>
                `;

                // --- БЛОК: МОИ БОТЫ ---
                html += `
                    <div class="section">
                        <div class="section-title">🤖 Мои боты <small>(${bots.length})</small></div>
                        <div id="botList">
                `;

                if (!hasExchange) {
                    html += `
                        <div class="empty-state">
                            <div class="icon">🔒</div>
                            <p>Подключите биржу, чтобы создавать ботов</p>
                        </div>
                    `;
                } else if (bots.length === 0) {
                    html += `
                        <div class="empty-state">
                            <div class="icon">🤖</div>
                            <p>У вас пока нет ботов. Создайте первого!</p>
                            <button class="btn-primary" style="margin-top:12px;" onclick="alert('Форма создания бота в разработке')">➕ Создать бота</button>
                        </div>
                    `;
                } else {
                    html += `<div id="botItems">`;
                    for (let index = 0; index < bots.length; index++) {
                        const bot = bots[index];
                        const statusClass = bot.active ? (bot.paused ? 'paused' : 'active') : 'inactive';
                        const statusText = bot.active ? (bot.paused ? '⏸ Пауза' : '✅ Активен') : '⛔ Отключен';
                        const pnl = bot.stats?.pnl || 0;
                        const signals = bot.stats?.total_signals || 0;
                        const mode = bot.mode || 'signals_only';
                        const modeLabel = mode === 'auto_trade' ? '🤖 Автоторговля' : 
                                         mode === 'hybrid' ? '🔀 Гибридный' : '📡 Только сигналы';

                        html += `
                            <div class="bot-item" data-index="${index}">
                                <div class="info">
                                    <span class="name">${bot.name || 'Без названия'}</span>
                                    <span class="details">
                                        🏦 ${bot.exchange?.toUpperCase() || 'Нет биржи'} · 
                                        ${modeLabel} · 
                                        📊 ${bot.strategies?.length || 0} стратегий · 
                                        📡 ${signals} сигналов · 
                                        PNL: <span style="color:${pnl >= 0 ? '#22c55e' : '#ef4444'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}$</span>
                                    </span>
                                </div>
                                <div class="actions">
                                    <span class="badge ${statusClass}">${statusText}</span>
                                    <button class="btn-secondary" onclick="toggleBotPause('${user.email}', ${index})" title="${bot.paused ? 'Возобновить' : 'Пауза'}">
                                        ${bot.paused ? '▶️' : '⏸️'}
                                    </button>
                                    <button class="btn-secondary" onclick="toggleBotActive('${user.email}', ${index})" title="${bot.active ? 'Отключить' : 'Активировать'}">
                                        ${bot.active ? '⛔' : '✅'}
                                    </button>
                                    <button class="btn-danger-sm" onclick="deleteBot('${user.email}', ${index})">🗑️</button>
                                </div>
                            </div>
                        `;
                    }
                    html += `</div>`;
                }

                html += `
                        </div>
                    </div>
                `;

                container.innerHTML = html;

                // --- ПОДКЛЮЧЕНИЕ ФОРМЫ ---
                document.getElementById('connectExchangeForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const exchange = document.getElementById('exchangeSelect').value;
                    const apiKey = document.getElementById('apiKeyInput').value.trim();
                    const secretKey = document.getElementById('secretKeyInput').value.trim();
                    const msgEl = document.getElementById('connectMessage');

                    if (!apiKey || !secretKey) {
                        msgEl.innerHTML = '<div class="message error">Заполните все поля</div>';
                        return;
                    }

                    msgEl.innerHTML = '<div class="message info">⏳ Проверка ключей...</div>';

                    try {
                        const result = await apiCall('/exchange/connect', {
                            method: 'POST',
                            body: JSON.stringify({ email: user.email, exchange, apiKey, secretKey })
                        });

                        if (result.success) {
                            msgEl.innerHTML = `<div class="message success">✅ Биржа ${exchange} успешно подключена!</div>`;
                            document.getElementById('apiKeyInput').value = '';
                            document.getElementById('secretKeyInput').value = '';
                            if (result.user) {
                                saveUser(result.user);
                            }
                            renderDashboard(result.user || user);
                        } else {
                            msgEl.innerHTML = `<div class="message error">❌ ${result.error || 'Ошибка подключения'}</div>`;
                        }
                    } catch (err) {
                        msgEl.innerHTML = `<div class="message error">❌ Ошибка соединения: ${err.message}</div>`;
                    }
                });

            } catch (err) {
                console.error('Ошибка загрузки дашборда:', err);
                container.innerHTML = `
                    <div class="section" style="text-align:center;padding:40px;">
                        <h3>❌ Ошибка загрузки</h3>
                        <p style="color:#94a3b8;">${err.message}</p>
                        <button class="btn-primary" style="margin-top:12px;" onclick="location.reload()">🔄 Обновить</button>
                    </div>
                `;
            }
        }

        // ============================================
        //  УПРАВЛЕНИЕ БОТАМИ (ЧЕРЕЗ API)
        // ============================================
        window.toggleBotPause = async function(email, index) {
            const user = getUser();
            try {
                const result = await apiCall(`/user/bots/${email}/${index}`, {
                    method: 'PUT',
                    body: JSON.stringify({ paused: true })
                });
                if (result.success) {
                    saveUser(result.user);
                    renderDashboard(result.user);
                } else {
                    alert('❌ ' + (result.error || 'Ошибка'));
                }
            } catch (err) {
                alert('❌ Ошибка: ' + err.message);
            }
        };

        window.toggleBotActive = async function(email, index) {
            const user = getUser();
            try {
                const result = await apiCall(`/user/bots/${email}/${index}`, {
                    method: 'PUT',
                    body: JSON.stringify({ active: false })
                });
                if (result.success) {
                    saveUser(result.user);
                    renderDashboard(result.user);
                } else {
                    alert('❌ ' + (result.error || 'Ошибка'));
                }
            } catch (err) {
                alert('❌ Ошибка: ' + err.message);
            }
        };

        window.deleteBot = async function(email, index) {
            if (!confirm('Удалить этого бота?')) return;
            const user = getUser();
            try {
                const result = await apiCall(`/user/bots/${email}/${index}`, {
                    method: 'DELETE'
                });
                if (result.success) {
                    saveUser(result.user);
                    renderDashboard(result.user);
                } else {
                    alert('❌ ' + (result.error || 'Ошибка'));
                }
            } catch (err) {
                alert('❌ Ошибка: ' + err.message);
            }
        };

        window.disconnectExchange = async function(email, exchange) {
            if (!confirm(`Отключить биржу ${exchange.toUpperCase()}?`)) return;
            try {
                const result = await apiCall('/exchange/disconnect', {
                    method: 'POST',
                    body: JSON.stringify({ email, exchange })
                });
                if (result.success) {
                    if (result.user) saveUser(result.user);
                    renderDashboard(result.user || getUser());
                } else {
                    alert('❌ ' + (result.error || 'Ошибка отключения'));
                }
            } catch (err) {
                alert('❌ Ошибка: ' + err.message);
            }
        };

        // ============================================
        //  ЛОГИН ФОРМА
        // ============================================
        function renderLoginForm() {
            const container = document.getElementById('mainContent');
            document.getElementById('userEmail').textContent = '';
            container.innerHTML = `
                <div class="login-form">
                    <h2>🔐 Вход в терминал</h2>
                    <form id="loginForm">
                        <input type="email" id="loginEmail" placeholder="Email" required>
                        <input type="password" id="loginPassword" placeholder="Пароль" required>
                        <button type="submit">Войти</button>
                        <div id="loginError" class="error"></div>
                    </form>
                    <div class="register-link">
                        Нет аккаунта? <a href="/login.html">Зарегистрироваться</a>
                    </div>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const errorEl = document.getElementById('loginError');

                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok && data.user) {
                        saveUser(data.user);
                        window.location.reload();
                    } else {
                        errorEl.textContent = data.error || 'Ошибка входа';
                    }
                } catch (err) {
                    errorEl.textContent = 'Ошибка соединения с сервером';
                }
            });
        }

        // ============================================
        //  INIT
        // ============================================
        const user = getUser();
        if (user && user.email) {
            renderDashboard(user);
        } else {
            renderLoginForm();
        }
    </script>

</body>
</html>
