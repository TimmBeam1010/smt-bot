<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot — Личный кабинет</title>
    <style>
        /* --- RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e17;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            padding: 0 20px;
        }
        a {
            color: #4f46e5;
            text-decoration: none;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #1e293b;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .logo:hover {
            opacity: 0.8;
        }
        .logo span {
            color: #4f46e5;
        }
        .btn-primary {
            background: #4f46e5;
            color: #fff !important;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary:hover {
            background: #4338ca;
        }
        .btn-danger {
            background: #dc2626;
            color: #fff !important;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .user-email {
            color: #94a3b8;
            font-size: 14px;
        }

        /* --- DASHBOARD GRID --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
        }
        .card h3 {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .card .value {
            font-size: 28px;
            font-weight: 700;
        }
        .card .value.positive { color: #22c55e; }
        .card .value.negative { color: #ef4444; }
        .card .sub {
            font-size: 14px;
            color: #64748b;
            margin-top: 4px;
        }

        /* --- SIGNALS TABLE --- */
        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin: 40px 0 16px;
        }
        .table-wrap {
            overflow-x: auto;
            background: #111827;
            border-radius: 12px;
            border: 1px solid #1e293b;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            text-align: left;
            padding: 12px 16px;
            background: #0f172a;
            color: #94a3b8;
            font-weight: 600;
        }
        td {
            padding: 12px 16px;
            border-top: 1px solid #1e293b;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.long { background: #22c55e20; color: #22c55e; }
        .badge.short { background: #ef444420; color: #ef4444; }
        .badge.profit { background: #22c55e20; color: #22c55e; }
        .badge.loss { background: #ef444420; color: #ef4444; }
        .badge.active { background: #f59e0b20; color: #f59e0b; }

        /* --- BOTS LIST --- */
        .bot-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
        }
        .bot-item:last-child {
            border-bottom: none;
        }
        .bot-item .name {
            font-weight: 600;
        }
        .bot-item .status {
            font-size: 14px;
        }
        .status.active { color: #22c55e; }
        .status.paused { color: #f59e0b; }
        .status.inactive { color: #64748b; }

        /* --- LOGIN FORM (если не авторизован) --- */
        .login-form {
            max-width: 400px;
            margin: 60px auto;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 40px;
        }
        .login-form h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            background: #0a0e17;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .login-form input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .login-form button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }
        .login-form button:hover {
            background: #4338ca;
        }
        .login-form .error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
        .login-form .register-link {
            text-align: center;
            margin-top: 16px;
            color: #94a3b8;
        }
        .login-form .register-link a {
            color: #4f46e5;
        }

        /* --- FOOTER --- */
        .footer {
            border-top: 1px solid #1e293b;
            padding: 24px 0;
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-top: 40px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <a href="/" class="logo">SMT <span>Bot</span></a>
            <div>
                <span class="user-email" id="userEmail"></span>
                <button class="btn-danger" id="logoutBtn" style="margin-left:12px;">Выйти</button>
            </div>
        </header>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div id="mainContent">
            <!-- Сюда будет вставлен либо дашборд, либо форма входа -->
        </div>

        <!-- FOOTER -->
        <footer class="footer">
            &copy; 2026 SMT Bot. Не является инвестиционной рекомендацией.
        </footer>
    </div>

    <script>
        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        function getUser() {
            try {
                const user = JSON.parse(localStorage.getItem('smt_user'));
                return user;
            } catch (e) {
                return null;
            }
        }

        function saveUser(user) {
            localStorage.setItem('smt_user', JSON.stringify(user));
        }

        function clearUser() {
            localStorage.removeItem('smt_user');
        }

        // --- ВЫХОД ---
        document.getElementById('logoutBtn').addEventListener('click', () => {
            clearUser();
            window.location.href = '/';
        });

        // --- ОТОБРАЖЕНИЕ ДАШБОРДА ---
        async function renderDashboard(user) {
            const container = document.getElementById('mainContent');
            document.getElementById('userEmail').textContent = user.email || '';

            try {
                // Загружаем данные демо-счета
                const res = await fetch(`/api/demo/${encodeURIComponent(user.email)}`);
                const data = await res.json();

                // Загружаем сигналы
                const signalsRes = await fetch(`/api/signals/user/${encodeURIComponent(user.email)}`);
                const signalsData = await signalsRes.json();

                let balance = 0;
                let equity = 0;
                let totalPnl = 0;
                let positions = [];
                let trades = [];

                if (data.ok && data.data) {
                    balance = data.data.balance || 0;
                    equity = data.data.equity || 0;
                    totalPnl = data.data.totalPnl || 0;
                    positions = data.data.positions || [];
                    trades = data.data.trades || [];
                }

                const signals = signalsData.signals || [];

                // --- Строим HTML ---
                let html = `
                    <!-- СТАТИСТИКА -->
                    <div class="dashboard-grid">
                        <div class="card">
                            <h3>💰 Баланс</h3>
                            <div class="value">$${balance.toFixed(2)}</div>
                            <div class="sub">Демо-счет</div>
                        </div>
                        <div class="card">
                            <h3>📈 Капитал</h3>
                            <div class="value">$${equity.toFixed(2)}</div>
                            <div class="sub">${positions.length} открытых позиций</div>
                        </div>
                        <div class="card">
                            <h3>📊 PNL</h3>
                            <div class="value ${totalPnl >= 0 ? 'positive' : 'negative'}">${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)}$</div>
                            <div class="sub">${balance > 0 ? ((totalPnl / balance) * 100).toFixed(2) : 0}% от депозита</div>
                        </div>
                        <div class="card">
                            <h3>📊 Сигналов</h3>
                            <div class="value">${signals.length}</div>
                            <div class="sub">за все время</div>
                        </div>
                    </div>
                `;

                // --- СИГНАЛЫ ---
                html += `<h2 class="section-title">📡 Последние сигналы</h2>`;
                if (signals.length === 0) {
                    html += `<div class="table-wrap"><div class="placeholder" style="padding:20px;text-align:center;color:#64748b;">Нет сигналов</div></div>`;
                } else {
                    html += `<div class="table-wrap"><table>
                        <thead><tr><th>Актив</th><th>Тип</th><th>Цена входа</th><th>Уверенность</th><th>Дата</th></tr></thead>
                        <tbody>`;
                    signals.slice(0, 10).forEach(s => {
                        html += `<tr>
                            <td><strong>${s.symbol}</strong></td>
                            <td><span class="badge ${s.side === 'LONG' ? 'long' : 'short'}">${s.side}</span></td>
                            <td>$${parseFloat(s.entry_price).toFixed(4)}</td>
                            <td>${s.confidence || 'medium'}</td>
                            <td>${new Date(s.created_at).toLocaleString()}</td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                // --- ОТКРЫТЫЕ ПОЗИЦИИ ---
                html += `<h2 class="section-title">🔓 Открытые позиции</h2>`;
                if (positions.length === 0) {
                    html += `<div class="table-wrap"><div class="placeholder" style="padding:20px;text-align:center;color:#64748b;">Нет открытых позиций</div></div>`;
                } else {
                    html += `<div class="table-wrap"><table>
                        <thead><tr><th>Актив</th><th>Тип</th><th>Цена входа</th><th>Размер</th><th>PNL</th></tr></thead>
                        <tbody>`;
                    positions.forEach(p => {
                        const pnl = p.pnl || 0;
                        html += `<tr>
                            <td><strong>${p.symbol}</strong></td>
                            <td><span class="badge ${p.side === 'LONG' ? 'long' : 'short'}">${p.side}</span></td>
                            <td>$${parseFloat(p.entry_price).toFixed(4)}</td>
                            <td>${p.size || 0}</td>
                            <td class="${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}$</td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                // --- БОТЫ ---
                html += `<h2 class="section-title">🤖 Мои боты</h2>`;
                const bots = user.bots || [];
                if (bots.length === 0) {
                    html += `<div class="table-wrap"><div class="placeholder" style="padding:20px;text-align:center;color:#64748b;">Нет подключенных ботов</div></div>`;
                } else {
                    html += `<div class="table-wrap"><table>
                        <thead><tr><th>Биржа</th><th>Тариф</th><th>Депозит</th><th>PNL</th><th>Статус</th></tr></thead>
                        <tbody>`;
                    bots.forEach(b => {
                        const statusClass = b.active ? (b.paused ? 'paused' : 'active') : 'inactive';
                        const statusText = b.active ? (b.paused ? '⏸ Пауза' : '✅ Активен') : '⛔ Отключен';
                        html += `<tr>
                            <td>${b.exchange || 'demo'}</td>
                            <td>${b.tariff || 'Базовый'}</td>
                            <td>$${b.deposit || 0}</td>
                            <td class="${(b.pnl || 0) >= 0 ? 'positive' : 'negative'}">${(b.pnl || 0) >= 0 ? '+' : ''}${(b.pnl || 0).toFixed(2)}$</td>
                            <td><span class="status ${statusClass}">${statusText}</span></td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                container.innerHTML = html;

            } catch (err) {
                console.error('Ошибка загрузки дашборда:', err);
                container.innerHTML = `<div class="card" style="margin-top:30px;text-align:center;padding:40px;"><h3>❌ Ошибка загрузки данных</h3><p style="color:#94a3b8;">${err.message}</p></div>`;
            }
        }

        // --- ОТОБРАЖЕНИЕ ФОРМЫ ВХОДА ---
        function renderLoginForm() {
            const container = document.getElementById('mainContent');
            document.getElementById('userEmail').textContent = '';
            container.innerHTML = `
                <div class="login-form">
                    <h2>🔐 Вход в терминал</h2>
                    <form id="loginForm">
                        <input type="email" id="loginEmail" placeholder="Email" required>
                        <input type="password" id="loginPassword" placeholder="Пароль" required>
                        <button type="submit">Войти</button>
                        <div id="loginError" class="error"></div>
                    </form>
                    <div class="register-link">
                        Нет аккаунта? <a href="/login.html">Зарегистрироваться</a>
                    </div>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const errorEl = document.getElementById('loginError');

                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok && data.user) {
                        // === ГЛАВНОЕ: СОХРАНЯЕМ ПОЛЬЗОВАТЕЛЯ ===
                        saveUser(data.user);
                        window.location.reload();
                    } else {
                        errorEl.textContent = data.error || 'Ошибка входа';
                    }
                } catch (err) {
                    errorEl.textContent = 'Ошибка соединения с сервером';
                }
            });
        }

        // --- ГЛАВНАЯ ЛОГИКА ---
        const user = getUser();
        if (user && user.email) {
            renderDashboard(user);
        } else {
            renderLoginForm();
        }
    </script>

</body>
</html>
