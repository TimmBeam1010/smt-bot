<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot — Личный кабинет</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0a0e17;
            color: #fff;
            padding: 16px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #1a1f2e;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700;
        }
        .header h1 span {
            color: #4f46e5;
        }
        .logout-btn {
            background: #f87171;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(14px, 1.5vw, 16px);
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: #ef4444;
        }
        .card {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #2d3748;
            margin-top: 20px;
        }
        .card h2 {
            font-size: clamp(18px, 2vw, 22px);
            margin-bottom: 12px;
            color: #94a3b8;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-top: 12px;
        }
        .stat-item {
            background: #2d3748;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-item h3 {
            font-size: clamp(22px, 3vw, 30px);
            color: #4f46e5;
        }
        .stat-item p {
            color: #94a3b8;
            font-size: clamp(12px, 1.2vw, 14px);
        }
        .signal-item {
            background: #2d3748;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #4f46e5;
        }
        .signal-item .symbol {
            font-weight: 600;
            font-size: clamp(16px, 1.5vw, 18px);
        }
        .signal-item .side {
            font-weight: 600;
            font-size: clamp(14px, 1.3vw, 16px);
        }
        .signal-item .side.long {
            color: #34d399;
        }
        .signal-item .side.short {
            color: #f87171;
        }
        .signal-item .meta {
            color: #94a3b8;
            font-size: clamp(12px, 1.2vw, 14px);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 4px;
        }
        .btn-primary {
            background: #4f46e5;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: clamp(14px, 1.5vw, 16px);
        }
        .btn-primary:hover {
            background: #4338ca;
        }
        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #94a3b8;
            text-decoration: none;
            font-size: clamp(14px, 1.5vw, 16px);
        }
        .back-link:hover {
            color: #fff;
        }
        .empty {
            color: #94a3b8;
            text-align: center;
            padding: 20px 0;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .stats {
                grid-template-columns: 1fr 1fr;
            }
            .logout-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Шапка -->
        <div class="header">
            <h1>🤖 <span>SMT</span> Bot</h1>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>

        <!-- Приветствие -->
        <div class="card">
            <h2>👋 Привет, <span id="userName">пользователь</span></h2>
            <p style="color: #94a3b8;">Добро пожаловать в личный кабинет. Ниже — последние сигналы и статистика.</p>
        </div>

        <!-- Статистика -->
        <div class="card">
            <h2>📊 Статистика</h2>
            <div class="stats">
                <div class="stat-item">
                    <h3 id="totalSignals">0</h3>
                    <p>Всего сигналов</p>
                </div>
                <div class="stat-item">
                    <h3 id="todaySignals">0</h3>
                    <p>За сегодня</p>
                </div>
            </div>
        </div>

        <!-- Последние сигналы -->
        <div class="card">
            <h2>📈 Последние сигналы</h2>
            <div id="signalsList">
                <p class="empty">Загрузка...</p>
            </div>
        </div>

        <a href="/" class="back-link">← На главную</a>
    </div>

    <script>
        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        const user = JSON.parse(localStorage.getItem('smtUser'));
        if (!user) {
            window.location.href = '/login.html';
        }

        // ===== ОТОБРАЖЕНИЕ ИМЕНИ =====
        document.getElementById('userName').textContent = user.email || 'пользователь';

        // ===== ВЫХОД =====
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('smtUser');
            window.location.href = '/';
        });

        // ===== ЗАГРУЗКА ДАННЫХ =====
        async function loadDashboard() {
            try {
                const res = await fetch('/api/user/' + user.email);
                const data = await res.json();
                if (res.ok && data.user) {
                    // Статистика (заглушка, позже сделаем полноценную)
                    document.getElementById('totalSignals').textContent = '12';
                    document.getElementById('todaySignals').textContent = '3';
                }
            } catch (err) {
                console.error('Ошибка загрузки:', err);
            }

            // Заглушка сигналов (позже — из БД)
            const signals = [
                { symbol: 'BONK-USDT', side: 'LONG', entry: 0.00000452, confidence: 'high' },
                { symbol: 'DOGS-USDT', side: 'SHORT', entry: 0.0000402, confidence: 'medium' },
                { symbol: 'SOL-USDT', side: 'LONG', entry: 69.8, confidence: 'high' },
            ];

            const container = document.getElementById('signalsList');
            if (signals.length === 0) {
                container.innerHTML = '<p class="empty">Нет сигналов</p>';
                return;
            }

            container.innerHTML = signals.map(s => `
                <div class="signal-item">
                    <div class="symbol">${s.symbol}</div>
                    <div class="side ${s.side.toLowerCase()}">${s.side}</div>
                    <div class="meta">
                        <span>💰 ${s.entry}</span>
                        <span>🎯 ${s.confidence}</span>
                    </div>
                </div>
            `).join('');
        }

        loadDashboard();
    </script>
</body>
</html>
