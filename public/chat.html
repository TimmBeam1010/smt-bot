<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 SMT Bot — Чат с памятью</title>
    <style>
        body {
            background: #0a0e17;
            color: #fff;
            font-family: sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .chat {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 16px;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .msg {
            padding: 8px 12px;
            border-radius: 8px;
            margin: 4px 0;
            max-width: 80%;
        }
        .user {
            background: #4f46e5;
            margin-left: auto;
            text-align: right;
        }
        .assistant {
            background: #2d3748;
            text-align: left;
        }
        .input-area {
            display: flex;
            gap: 8px;
        }
        textarea {
            flex: 1;
            padding: 12px;
            background: #1a1f2e;
            color: #fff;
            border: 1px solid #2d3748;
            border-radius: 8px;
            resize: none;
        }
        button {
            background: #4f46e5;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #4338ca;
        }
        .loader {
            display: none;
            text-align: center;
            padding: 8px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <h1>📦 SMT Bot — Чат с памятью</h1>
    <div class="chat" id="chatBox"></div>
    <div class="input-area">
        <textarea id="userInput" rows="2" placeholder="Напишите сообщение..." style="flex:1;"></textarea>
        <button id="sendBtn">➤</button>
    </div>
    <div class="loader" id="loader">⏳ DeepSeek думает...</div>

    <script>
        const API_URL = 'http://72.56.249.109:5000';
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const loader = document.getElementById('loader');

        async function loadHistory() {
            try {
                const res = await fetch(`${API_URL}/api/chat/export?limit=50`);
                const data = await res.json();
                if (data.history) {
                    chatBox.innerHTML = data.history.map(msg =>
                        `<div class="msg ${msg.role}">${msg.content}</div>`
                    ).join('');
                }
            } catch (e) {
                console.error('Ошибка загрузки истории:', e);
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Сохраняем сообщение пользователя
            await saveMessage('user', text);
            userInput.value = '';

            // Получаем ответ от DeepSeek
            loader.style.display = 'block';
            try {
                const res = await fetch(`${API_URL}/api/deepseek`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                if (data.reply) {
                    await saveMessage('assistant', data.reply);
                } else {
                    await saveMessage('assistant', '❌ Не удалось получить ответ от DeepSeek.');
                }
            } catch (e) {
                console.error('Ошибка:', e);
                await saveMessage('assistant', '❌ Ошибка соединения с сервером.');
            } finally {
                loader.style.display = 'none';
            }

            loadHistory();
        }

        async function saveMessage(role, content) {
            try {
                await fetch(`${API_URL}/api/chat/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, content, session_id: 'main' })
                });
            } catch (e) {
                console.error('Ошибка сохранения:', e);
            }
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        loadHistory();
    </script>

</body>
</html>
