<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot — Вход</title>
    <style>
        body {
            background: #0a0e17;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #1a1f2e;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #0a0e17;
            color: #fff;
            border: 1px solid #2d3748;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            background: #4338ca;
        }
        .error {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
        }
        .footer a {
            color: #4f46e5;
            text-decoration: none;
            cursor: pointer;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #94a3b8;
            text-decoration: none;
        }
        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMT Bot</h1>
        <div class="subtitle">Войдите или создайте аккаунт</div>

        <div class="error" id="errorMessage"></div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Пароль (мин. 6 символов)</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button id="loginBtn">Войти</button>

        <div class="footer">
            Нет аккаунта? <a id="registerLink">Зарегистрироваться</a>
        </div>

        <a href="/" class="back-link">← На главную</a>
    </div>

    <script>
        (function() {
            // Если уже есть сессия — сразу идём в дашборд
            const savedEmail = localStorage.getItem('smt_user_email');
            if (savedEmail) {
                window.location.href = '/dashboard.html';
                return;
            }

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorEl = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const registerLink = document.getElementById('registerLink');

            function showError(msg) {
                errorEl.textContent = msg;
                errorEl.style.display = 'block';
                setTimeout(() => {
                    errorEl.style.display = 'none';
                }, 5000);
            }

            async function login() {
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    showError('Заполните все поля');
                    return;
                }

                if (password.length < 6) {
                    showError('Пароль должен быть минимум 6 символов');
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = '⏳ Загрузка...';

                try {
                    const resp = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await resp.json();

                    if (data.user) {
                        localStorage.setItem('smt_user_email', data.user.email);
                        window.location.replace('/dashboard.html');
                    } else {
                        showError(data.error || 'Неверный email или пароль');
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Войти';
                    }
                } catch (e) {
                    console.error('Login error:', e);
                    showError('Ошибка соединения с сервером');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Войти';
                }
            }

            async function register() {
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    showError('Заполните email и пароль');
                    return;
                }

                if (password.length < 6) {
                    showError('Пароль должен быть минимум 6 символов');
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = '⏳ Регистрация...';

                try {
                    const resp = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await resp.json();

                    if (data.user) {
                        localStorage.setItem('smt_user_email', data.user.email);
                        window.location.replace('/dashboard.html');
                    } else {
                        showError(data.error || 'Ошибка регистрации');
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Войти';
                    }
                } catch (e) {
                    console.error('Register error:', e);
                    showError('Ошибка соединения с сервером');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Войти';
                }
            }

            loginBtn.addEventListener('click', login);
            registerLink.addEventListener('click', register);

            passwordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') login();
            });

            emailInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') passwordInput.focus();
            });

        })();
    </script>
</body>
</html>
