<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot — Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e17;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .login-card h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
        .login-card h1 span {
            color: #4f46e5;
        }
        .login-card p {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .login-card label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }
        .login-card input {
            width: 100%;
            padding: 12px 14px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .login-card input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-card button:hover {
            background: #4338ca;
        }
        .login-card .error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        .login-card .footer {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }
        .login-card .footer a {
            color: #4f46e5;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>SMT <span>Bot</span></h1>
        <p>Войдите в свой аккаунт</p>

        <form id="loginForm">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="example@mail.com" value="trnabiev@gmail.com" required>

            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="••••••••" value="12332580" required>

            <button type="submit">Войти</button>
            <div class="error" id="loginError">Неверный email или пароль</div>
        </form>

        <div class="footer">
            Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('smt_user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    errorEl.textContent = data.error || 'Ошибка входа';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Ошибка соединения с сервером';
                errorEl.style.display = 'block';
                console.error(err);
            }
        });
    </script>
</body>
</html>
