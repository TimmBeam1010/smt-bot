<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Bot — Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0a0e17;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .login-card {
            background: #1a1f2e;
            padding: 32px 28px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        }
        .login-card h1 {
            text-align: center;
            font-size: clamp(24px, 5vw, 32px);
            font-weight: 700;
        }
        .login-card h1 span {
            color: #4f46e5;
        }
        .login-card .sub {
            text-align: center;
            color: #94a3b8;
            font-size: clamp(14px, 1.5vw, 16px);
            margin-bottom: 24px;
        }
        .login-card input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0 16px;
            background: #2d3748;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: clamp(14px, 1.5vw, 16px);
        }
        .login-card input:focus {
            outline: 2px solid #4f46e5;
            background: #374151;
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: #fff;
            font-weight: 600;
            font-size: clamp(16px, 1.5vw, 18px);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 4px;
        }
        .login-card button:hover {
            background: #4338ca;
            transform: scale(1.01);
        }
        .login-card button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .toggle {
            text-align: center;
            margin-top: 16px;
            font-size: clamp(14px, 1.5vw, 16px);
            color: #94a3b8;
        }
        .toggle a {
            color: #818cf8;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .toggle a:hover {
            text-decoration: underline;
        }
        #message {
            margin-top: 12px;
            text-align: center;
            font-size: clamp(14px, 1.5vw, 16px);
            min-height: 22px;
            padding: 8px;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
        }
        .success {
            color: #34d399;
        }
        .error {
            color: #f87171;
        }
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 10px auto 0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #94a3b8;
            font-size: clamp(14px, 1.5vw, 16px);
            text-decoration: none;
        }
        .back-link:hover {
            color: #fff;
        }
        .code-block {
            margin: 12px 0 8px 0;
            padding: 16px;
            background: #2d3748;
            border-radius: 12px;
            border: 1px solid #4f46e5;
        }
        .code-block input {
            width: 100%;
            padding: 14px;
            background: #1a1f2e;
            border: 2px solid #4f46e5;
            border-radius: 10px;
            color: #fff;
            font-size: clamp(18px, 2vw, 22px);
            text-align: center;
            letter-spacing: 6px;
            margin: 0 0 12px 0;
        }
        .code-block input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.3);
        }
        .code-block .resend-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #4f46e5;
            color: #94a3b8;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(14px, 1.5vw, 16px);
            transition: 0.2s;
        }
        .code-block .resend-btn:hover {
            background: #4f46e5;
            color: #fff;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🤖 <span>SMT</span> Bot</h1>
        <p class="sub" id="formTitle">Войдите в аккаунт</p>

        <form id="authForm">
            <input type="email" id="email" placeholder="Email" required autofocus>
            <input type="password" id="password" placeholder="Пароль (мин. 6 символов)" required>
            <input type="text" id="username" placeholder="Имя (опционально)" style="display: none;">

            <div id="codeBlock" class="code-block hidden">
                <input type="text" id="verificationCode" placeholder="Введите код" maxlength="6" inputmode="numeric">
                <button type="button" id="resendCodeBtn" class="resend-btn">Отправить код повторно</button>
            </div>

            <button type="submit" id="submitBtn">Войти</button>
        </form>

        <div class="toggle">
            <span id="toggleText">Нет аккаунта? </span>
            <a id="toggleLink">Зарегистрироваться</a>
        </div>

        <div id="message"></div>
        <div class="loader" id="loader"></div>

        <a href="/" class="back-link">← На главную</a>
    </div>

    <script>
        // ===== ЭЛЕМЕНТЫ =====
        const form = document.getElementById('authForm');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const username = document.getElementById('username');
        const verificationCode = document.getElementById('verificationCode');
        const codeBlock = document.getElementById('codeBlock');
        const submitBtn = document.getElementById('submitBtn');
        const toggleLink = document.getElementById('toggleLink');
        const toggleText = document.getElementById('toggleText');
        const resendCodeBtn = document.getElementById('resendCodeBtn');
        const message = document.getElementById('message');
        const loader = document.getElementById('loader');
        const formTitle = document.getElementById('formTitle');

        let isLogin = true;
        let pendingEmail = '';

        // ===== ПЕРЕКЛЮЧЕНИЕ МЕЖДУ ВХОДОМ И РЕГИСТРАЦИЕЙ =====
        toggleLink.addEventListener('click', () => {
            isLogin = !isLogin;
            codeBlock.classList.add('hidden');
            verificationCode.value = '';
            if (isLogin) {
                submitBtn.textContent = 'Войти';
                toggleText.textContent = 'Нет аккаунта? ';
                toggleLink.textContent = 'Зарегистрироваться';
                username.style.display = 'none';
                formTitle.textContent = 'Войдите в аккаунт';
                document.querySelector('.sub').textContent = 'Войдите или создайте аккаунт';
            } else {
                submitBtn.textContent = 'Зарегистрироваться';
                toggleText.textContent = 'Уже есть аккаунт? ';
                toggleLink.textContent = 'Войти';
                username.style.display = 'block';
                formTitle.textContent = 'Создайте аккаунт';
                document.querySelector('.sub').textContent = 'Зарегистрируйтесь, чтобы начать';
            }
            message.textContent = '';
            message.className = '';
        });

        // ===== ПОВТОРНАЯ ОТПРАВКА КОДА =====
        resendCodeBtn.addEventListener('click', async () => {
            const emailValue = email.value.trim();
            if (!emailValue) {
                setMessage('Введите email для отправки кода', 'error');
                return;
            }
            try {
                const res = await fetch('/api/resend-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailValue })
                });
                const data = await res.json();
                if (res.ok) {
                    setMessage('✅ Новый код отправлен на почту', 'success');
                } else {
                    setMessage('❌ ' + (data.error || 'Ошибка отправки'), 'error');
                }
            } catch (err) {
                setMessage('❌ Ошибка соединения', 'error');
            }
        });

        function setMessage(text, type) {
            message.textContent = text;
            message.className = type;
            clearTimeout(window.messageTimeout);
            window.messageTimeout = setTimeout(() => {
                message.textContent = '';
                message.className = '';
            }, 5000);
        }

        // ===== ОТПРАВКА ФОРМЫ =====
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const emailValue = email.value.trim();
            const passwordValue = password.value;
            const usernameValue = username.value.trim() || null;
            const codeValue = verificationCode.value.trim();

            // ===== РЕЖИМ ВЕРИФИКАЦИИ (код) =====
            if (!isLogin && !codeBlock.classList.contains('hidden')) {
                if (!codeValue) {
                    setMessage('Введите код из письма', 'error');
                    return;
                }
                try {
                    const res = await fetch('/api/verify', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: emailValue, code: codeValue })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setMessage('✅ Почта подтверждена! Вход выполнен.', 'success');
                        localStorage.setItem('smtUser', JSON.stringify(data.user));
                        setTimeout(() => {
                            window.location.href = '/dashboard.html';
                        }, 500);
                    } else {
                        setMessage('❌ ' + (data.error || 'Неверный код'), 'error');
                    }
                } catch (err) {
                    setMessage('❌ Ошибка соединения', 'error');
                }
                return;
            }

            // ===== РЕГИСТРАЦИЯ =====
            if (!isLogin) {
                if (!emailValue || !passwordValue) {
                    setMessage('Заполните все обязательные поля', 'error');
                    return;
                }
                if (passwordValue.length < 6) {
                    setMessage('Пароль должен быть минимум 6 символов', 'error');
                    return;
                }

                submitBtn.disabled = true;
                loader.style.display = 'block';

                try {
                    const res = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: emailValue,
                            password: passwordValue,
                            username: usernameValue
                        })
                    });
                    const data = await res.json();
                    if (res.ok && data.needVerification) {
                        codeBlock.classList.remove('hidden');
                        submitBtn.textContent = 'Подтвердить код';
                        setMessage('✅ Код отправлен на почту. Введите его ниже.', 'success');
                        pendingEmail = emailValue;
                        formTitle.textContent = 'Подтверждение почты';
                        document.querySelector('.sub').textContent = 'Введите код из письма';
                    } else if (res.ok) {
                        setMessage('✅ Регистрация успешна! Войдите.', 'success');
                        isLogin = true;
                        submitBtn.textContent = 'Войти';
                        toggleText.textContent = 'Нет аккаунта? ';
                        toggleLink.textContent = 'Зарегистрироваться';
                        username.style.display = 'none';
                        formTitle.textContent = 'Войдите в аккаунт';
                        document.querySelector('.sub').textContent = 'Войдите или создайте аккаунт';
                        codeBlock.classList.add('hidden');
                    } else {
                        setMessage('❌ ' + (data.error || 'Ошибка регистрации'), 'error');
                    }
                } catch (err) {
                    setMessage('❌ Ошибка соединения', 'error');
                } finally {
                    submitBtn.disabled = false;
                    loader.style.display = 'none';
                }
                return;
            }

            // ===== ВХОД (без верификации) =====
            if (!emailValue || !passwordValue) {
                setMessage('Заполните все обязательные поля', 'error');
                return;
            }

            submitBtn.disabled = true;
            loader.style.display = 'block';

            try {
                const checkRes = await fetch('/api/user/' + encodeURIComponent(emailValue));
                const userData = await checkRes.json();

                if (!checkRes.ok || !userData.user) {
                    // Пользователь не найден → переключаем на регистрацию
                    setMessage('🔍 Пользователь не найден. Переключаем на регистрацию...', 'success');
                    isLogin = false;
                    submitBtn.textContent = 'Зарегистрироваться';
                    toggleText.textContent = 'Уже есть аккаунт? ';
                    toggleLink.textContent = 'Войти';
                    username.style.display = 'block';
                    formTitle.textContent = 'Создайте аккаунт';
                    document.querySelector('.sub').textContent = 'Зарегистрируйтесь, чтобы начать';
                    password.value = '';
                    username.value = '';
                    codeBlock.classList.add('hidden');
                    setTimeout(() => {
                        message.textContent = '';
                        message.className = '';
                    }, 1500);
                    return;
                }

                // Пользователь существует → проверяем пароль
                const loginRes = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailValue, password: passwordValue })
                });
                const loginData = await loginRes.json();

                if (loginRes.ok) {
                    setMessage('✅ Вход выполнен!', 'success');
                    localStorage.setItem('smtUser', JSON.stringify(loginData.user));
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 500);
                } else if (loginRes.status === 403 && loginData.needVerification) {
                    // Пользователь не верифицирован → сообщение, но поле для кода НЕ ПОКАЗЫВАЕМ
                    setMessage('⚠️ ' + loginData.error + '. Обратитесь к администратору или завершите регистрацию.', 'error');
                } else {
                    setMessage('❌ Неверный пароль. Попробуйте снова.', 'error');
                    password.value = '';
                    password.focus();
                }
            } catch (err) {
                setMessage('❌ Ошибка соединения', 'error');
            } finally {
                submitBtn.disabled = false;
                loader.style.display = 'none';
            }
        });

        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        if (localStorage.getItem('smtUser')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
