<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 SMT Bot — Админка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e17;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2d3748;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4f46e5;
        }
        .logo span {
            color: #fff;
        }
        .nav {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav a:hover {
            color: #fff;
            background: #1a1f2e;
        }
        .logout-btn {
            background: #1a1f2e;
            color: #94a3b8;
            border: 1px solid #2d3748;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            background: #2d3748;
            color: #fff;
        }
        .card {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2d3748;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h2 {
            font-size: 20px;
            font-weight: 600;
        }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #1a1f2e;
            flex-wrap: wrap;
            gap: 8px;
        }
        .user-item:last-child {
            border-bottom: none;
        }
        .user-item .left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-active {
            background: #065f46;
            color: #6ee7b7;
        }
        .badge-blocked {
            background: #7f1d1d;
            color: #fca5a5;
        }
        .btn-toggle {
            padding: 4px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        .btn-toggle.block {
            background: #ef4444;
            color: #fff;
        }
        .btn-toggle.block:hover {
            background: #dc2626;
        }
        .btn-toggle.unblock {
            background: #10b981;
            color: #fff;
        }
        .btn-toggle.unblock:hover {
            background: #059669;
        }
        .empty {
            color: #94a3b8;
            text-align: center;
            padding: 40px;
            font-size: 16px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stats-row .stat {
            background: #0a0e17;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .stats-row .stat .value {
            font-size: 20px;
            font-weight: 700;
        }
        .stats-row .stat .label {
            color: #94a3b8;
            font-size: 11px;
            text-transform: uppercase;
        }
        .user-time {
            color: #94a3b8;
            font-size: 12px;
        }
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .nav {
                justify-content: center;
            }
            .user-item {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .user-item .left {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SMT <span>Bot</span> 🔐</div>
        <div class="nav">
            <span style="color:#ef4444;font-size:14px;">🔒 Админ-панель</span>
            <a href="/dashboard.html">📊 ЛК</a>
            <a href="/index.html">Главная</a>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>👥 Управление пользователями</h2>
            <button class="refresh-btn" onclick="loadUsers()" style="background:#4f46e5;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;">🔄 Обновить</button>
        </div>

        <div class="stats-row" id="statsRow">
            <div class="stat">
                <div class="value" id="statTotal">0</div>
                <div class="label">Всего</div>
            </div>
            <div class="stat">
                <div class="value positive" id="statActive">0</div>
                <div class="label">Активных</div>
            </div>
            <div class="stat">
                <div class="value negative" id="statBlocked">0</div>
                <div class="label">Заблокированных</div>
            </div>
        </div>

        <div id="usersContainer">
            <div class="empty">Загрузка...</div>
        </div>
    </div>

    <script>
        (function() {
            // Простая проверка пароля для админки
            const adminPassword = 'admin123';
            const sessionKey = 'smt_admin_session';
            
            if (!sessionStorage.getItem(sessionKey)) {
                const input = prompt('🔐 Введите пароль администратора:');
                if (input === adminPassword) {
                    sessionStorage.setItem(sessionKey, 'true');
                } else {
                    alert('❌ Неверный пароль!');
                    window.location.replace('/dashboard.html');
                    return;
                }
            }

            async function loadUsers() {
                try {
                    const resp = await fetch('/api/admin/users');
                    const data = await resp.json();
                    if (data.users) {
                        renderUsers(data.users);
                    } else {
                        renderUsers([]);
                    }
                } catch (e) {
                    console.error('Ошибка загрузки пользователей:', e);
                    renderUsers([]);
                }
            }

            function renderUsers(users) {
                const container = document.getElementById('usersContainer');
                
                const total = users.length;
                const active = users.filter(u => u.is_active !== false).length;
                const blocked = users.filter(u => u.is_active === false).length;

                document.getElementById('statTotal').textContent = total;
                document.getElementById('statActive').textContent = active;
                document.getElementById('statBlocked').textContent = blocked;

                if (!users || users.length === 0) {
                    container.innerHTML = '<div class="empty">Нет пользователей</div>';
                    return;
                }

                container.innerHTML = users.map(u => {
                    const isActive = u.is_active !== false;
                    return `
                        <div class="user-item">
                            <div class="left">
                                <strong>${u.email || '--'}</strong>
                                <span class="badge ${isActive ? 'badge-active' : 'badge-blocked'}">
                                    ${isActive ? '✅ Активен' : '⛔ Заблокирован'}
                                </span>
                                <span class="user-time">
                                    📅 ${u.created_at ? new Date(u.created_at).toLocaleString() : '--'}
                                </span>
                            </div>
                            <div>
                                <button class="btn-toggle ${isActive ? 'block' : 'unblock'}" onclick="toggleUser('${u.id}', ${!isActive})">
                                    ${isActive ? '🔒 Заблокировать' : '🔓 Разблокировать'}
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.toggleUser = async function(userId, newStatus) {
                if (!confirm(`Подтвердите ${newStatus ? 'разблокировку' : 'блокировку'} пользователя`)) return;

                try {
                    const resp = await fetch(`/api/admin/users/${userId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ is_active: newStatus })
                    });
                    const data = await resp.json();
                    if (data.user) {
                        loadUsers();
                    } else {
                        alert('❌ Ошибка обновления статуса');
                    }
                } catch (e) {
                    console.error('Ошибка:', e);
                    alert('❌ Ошибка при обновлении');
                }
            };

            window.logout = function() {
                sessionStorage.removeItem('smt_admin_session');
                localStorage.removeItem('smt_user_email');
                window.location.replace('/login.html');
            };

            window.loadUsers = loadUsers;

            loadUsers();

        })();
    </script>

</body>
</html>
