<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 SMT Bot — Создать бота</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e17;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2d3748;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4f46e5;
        }
        .logo span {
            color: #fff;
        }
        .back-link {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .card {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2d3748;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h2 {
            font-size: 20px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #0a0e17;
            color: #fff;
            border: 1px solid #2d3748;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .form-group .hint {
            color: #94a3b8;
            font-size: 12px;
            margin-top: 4px;
        }
        .btn-save {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-save:hover {
            background: #4338ca;
        }
        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status-msg {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        .status-msg.success {
            display: block;
            background: #065f46;
            color: #6ee7b7;
        }
        .status-msg.error {
            display: block;
            background: #7f1d1d;
            color: #fca5a5;
        }
        .status-msg.info {
            display: block;
            background: #92400e;
            color: #fbbf24;
        }
        .status-msg.auto {
            display: block;
            background: #1e293b;
            color: #4f46e5;
            border: 1px solid #4f46e5;
        }
        .api-section {
            display: none;
            border-top: 1px solid #2d3748;
            padding-top: 16px;
            margin-top: 16px;
        }
        .api-section.visible {
            display: block;
        }
        .exchange-logo {
            font-size: 32px;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-connected {
            background: #065f46;
            color: #6ee7b7;
        }
        .badge-disconnected {
            background: #7f1d1d;
            color: #fca5a5;
        }
        .exchanges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .exchange-option {
            background: #0a0e17;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #1a1f2e;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .exchange-option:hover {
            border-color: #4f46e5;
        }
        .exchange-option.selected {
            border-color: #4f46e5;
            background: #1a1f2e;
        }
        .exchange-option .logo {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }
        .exchange-option .name {
            font-size: 13px;
            font-weight: 500;
        }
        .exchange-option .status {
            font-size: 11px;
            color: #94a3b8;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .card {
                padding: 16px;
            }
            .exchanges-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SMT <span>Bot</span></div>
        <a href="/dashboard.html" class="back-link">← Назад в ЛК</a>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>🤖 Создать нового бота</h2>
        </div>

        <div class="status-msg" id="statusMessage"></div>

        <div class="form-group">
            <label>Выберите биржу</label>
            <div class="exchanges-grid" id="exchangesGrid">
                <!-- Загружается из API -->
            </div>
        </div>

        <div class="form-group">
            <label for="botName">Название бота</label>
            <input type="text" id="botName" placeholder="Мой первый бот">
        </div>

        <div class="form-group">
            <label for="strategy">Стратегия</label>
            <select id="strategy">
                <option value="rsi">RSI (перепроданность/перекупленность)</option>
                <option value="macd">MACD (пересечение)</option>
                <option value="bollinger">Bollinger Bands (отскок от границ)</option>
                <option value="combined" selected>Комбинированная (RSI + MACD)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="deposit">Депозит ($)</label>
            <input type="number" id="deposit" placeholder="1000" value="1000">
        </div>

        <div class="api-section" id="apiSection">
            <div style="border-top:1px solid #2d3748;padding-top:16px;margin-top:8px;">
                <h4 style="margin-bottom:12px;">🔑 Введите API-ключи для <span id="selectedExchangeName">выбранной биржи</span></h4>
                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input type="text" id="apiKey" placeholder="Введите API Key">
                </div>
                <div class="form-group">
                    <label for="secretKey">Secret Key</label>
                    <input type="password" id="secretKey" placeholder="Введите Secret Key">
                </div>
                <div class="hint" style="color:#94a3b8;font-size:12px;margin-top:-8px;margin-bottom:12px;">
                    <a href="#" id="docsLink" target="_blank" style="color:#4f46e5;">Как получить API ключи?</a>
                </div>
            </div>
        </div>

        <button class="btn-save" id="saveBtn" onclick="createBot()">🚀 Создать бота</button>
    </div>

    <script>
        (function() {
            const userEmail = localStorage.getItem('smt_user_email');
            if (!userEmail) {
                window.location.replace('/login.html');
                return;
            }

            let allExchanges = [];
            let userExchanges = [];
            let selectedExchangeId = null;
            let isAutoFilled = false;

            const EXCHANGE_LOGOS = {
                'binance': '🟡',
                'bybit': '🔵',
                'okx': '🔴',
                'gateio': '🟣',
                'kucoin': '🟢',
                'kraken': '🟠',
                'bitget': '🟡',
                'htx': '🔵',
                'mexc': '🔴',
                'bingx': '🟣',
                'coinex': '🟢',
                'bitmex': '🔵',
                'crypto_com': '🔴',
                'upbit': '🟣',
                'whitebit': '🟢',
                'exmo': '🟠',
                'bitfinex': '🟡',
                'phemex': '🔵'
            };

            function showStatus(type, message) {
                const el = document.getElementById('statusMessage');
                el.className = 'status-msg ' + type;
                el.textContent = message;
                el.style.display = 'block';
                setTimeout(() => {
                    el.style.display = 'none';
                }, 8000);
            }

            async function loadData() {
                try {
                    const allResp = await fetch('/api/exchanges/list');
                    const allData = await allResp.json();
                    allExchanges = allData.exchanges || [];

                    const userResp = await fetch(`/api/user/${userEmail}`);
                    const userData = await userResp.json();
                    userExchanges = userData.user?.exchanges || [];

                    renderExchanges();
                } catch (e) {
                    console.error('Ошибка загрузки:', e);
                    showStatus('error', '❌ Ошибка загрузки данных');
                }
            }

            function renderExchanges() {
                const container = document.getElementById('exchangesGrid');
                
                container.innerHTML = allExchanges.map(ex => {
                    const userEx = userExchanges.find(ue => ue.id === ex.id);
                    const isConnected = userEx && userEx.api_key && userEx.secret_key;
                    const logo = EXCHANGE_LOGOS[ex.id] || ex.logo || '🏦';
                    
                    return `
                        <div class="exchange-option" data-id="${ex.id}" onclick="selectExchange('${ex.id}')">
                            <span class="logo">${logo}</span>
                            <div class="name">${ex.name}</div>
                            <div class="status">
                                ${isConnected ? '✅ Подключена' : '❌ Не подключена'}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.selectExchange = function(exchangeId) {
                selectedExchangeId = exchangeId;
                
                document.querySelectorAll('.exchange-option').forEach(el => {
                    el.classList.toggle('selected', el.dataset.id === exchangeId);
                });

                const exchange = allExchanges.find(ex => ex.id === exchangeId);
                const userEx = userExchanges.find(ue => ue.id === exchangeId);
                const isConnected = userEx && userEx.api_key && userEx.secret_key;
                const logo = EXCHANGE_LOGOS[exchangeId] || exchange?.logo || '🏦';

                document.getElementById('selectedExchangeName').textContent = exchange?.name || 'биржи';
                document.getElementById('docsLink').href = exchange?.docs || '#';

                const apiSection = document.getElementById('apiSection');
                const apiKeyInput = document.getElementById('apiKey');
                const secretKeyInput = document.getElementById('secretKey');

                if (isConnected) {
                    apiSection.classList.add('visible');
                    apiKeyInput.value = '••••••••••••••••';
                    secretKeyInput.value = '••••••••••••••••';
                    apiKeyInput.disabled = true;
                    secretKeyInput.disabled = true;
                    isAutoFilled = true;
                    showStatus('auto', `✅ Биржа "${exchange?.name}" уже подключена. API-ключи будут взяты из сохранённых.`);
                } else {
                    apiSection.classList.add('visible');
                    apiKeyInput.value = '';
                    secretKeyInput.value = '';
                    apiKeyInput.disabled = false;
                    secretKeyInput.disabled = false;
                    isAutoFilled = false;
                    showStatus('info', `🔑 Введите API-ключи для "${exchange?.name}"`);
                }
            };

            window.createBot = async function() {
                if (!selectedExchangeId) {
                    showStatus('error', '❌ Выберите биржу');
                    return;
                }

                const botName = document.getElementById('botName').value.trim();
                if (!botName) {
                    showStatus('error', '❌ Введите название бота');
                    return;
                }

                const strategy = document.getElementById('strategy').value;
                const deposit = parseFloat(document.getElementById('deposit').value);
                if (!deposit || deposit <= 0) {
                    showStatus('error', '❌ Введите корректный депозит');
                    return;
                }

                const apiKey = document.getElementById('apiKey').value.trim();
                const secretKey = document.getElementById('secretKey').value.trim();

                if (!isAutoFilled && (!apiKey || !secretKey)) {
                    showStatus('error', '❌ Введите API-ключи для выбранной биржи');
                    return;
                }

                document.getElementById('saveBtn').disabled = true;
                document.getElementById('saveBtn').textContent = '⏳ Создание...';

                try {
                    const payload = {
                        email: userEmail,
                        exchangeId: selectedExchangeId,
                        name: botName,
                        strategy: strategy,
                        deposit: deposit,
                        apiKey: isAutoFilled ? null : apiKey,
                        secretKey: isAutoFilled ? null : secretKey,
                        autoUseExisting: isAutoFilled
                    };

                    console.log('📤 Отправка:', payload);

                    const resp = await fetch('/api/bot/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await resp.json();
                    console.log('📥 Ответ:', data);

                    if (resp.ok) {
                        showStatus('success', `✅ Бот "${botName}" создан успешно!`);
                        setTimeout(() => {
                            window.location.href = '/dashboard.html';
                        }, 1500);
                    } else {
                        showStatus('error', '❌ Ошибка: ' + (data.error || 'Неизвестная ошибка'));
                    }
                } catch (e) {
                    console.error('Ошибка создания бота:', e);
                    showStatus('error', '❌ Ошибка: ' + e.message);
                }

                document.getElementById('saveBtn').disabled = false;
                document.getElementById('saveBtn').textContent = '🚀 Создать бота';
            };

            loadData();

        })();
    </script>

</body>
</html>
